<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Deeper Mindfulness</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; font-family:'Georgia',serif; background:#0a0f0d; }

    /* Slideshow */
    .slideshow { position:fixed; inset:0; z-index:0; }
    .slide { position:absolute; inset:0; background-size:cover; background-position:center; opacity:0; transition:opacity 3s ease-in-out; }
    .slide.active { opacity:1; }
    .veil { position:fixed; inset:0; z-index:1; background:rgba(0,0,0,0.38); }

    /* Layout */
    .panel { position:fixed; inset:0; z-index:2; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }

    .glass {
      width:100%; max-width:500px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
      border:1px solid rgba(255,255,255,0.13);
      border-radius:22px;
      overflow:hidden;
      display:flex; flex-direction:column;
    }

    /* Header */
    .header { padding:22px 28px 16px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.07); }
    .wordmark { font-size:10px; letter-spacing:0.25em; text-transform:uppercase; color:rgba(255,255,255,0.4); }

    /* Tab bar */
    .tabs { display:flex; border-bottom:1px solid rgba(255,255,255,0.07); }
    .tab {
      flex:1; padding:12px; text-align:center;
      font-size:11px; letter-spacing:0.15em; text-transform:uppercase;
      color:rgba(255,255,255,0.35); cursor:pointer;
      background:none; border:none; transition:all 0.2s ease;
    }
    .tab.active { color:rgba(255,255,255,0.85); border-bottom:1.5px solid rgba(180,230,200,0.6); }

    /* Talk tab */
    .talk-view { padding:28px 28px 24px; display:flex; flex-direction:column; align-items:center; gap:22px; }
    .arc-banner {
      width:100%; background:rgba(180,230,200,0.08);
      border:1px solid rgba(180,230,200,0.2); border-radius:10px;
      padding:12px 16px; font-size:13px; line-height:1.6;
      color:rgba(180,230,200,0.8); display:none;
    }
    .arc-banner.visible { display:block; }

    .transcript-area { width:100%; min-height:80px; display:flex; align-items:center; justify-content:center; text-align:center; }
    .transcript-text { font-size:16px; line-height:1.7; color:rgba(255,255,255,0.88); font-style:italic; transition:opacity 0.3s; }
    .transcript-text.dim { opacity:0.4; }
    .transcript-text.user { font-style:normal; color:rgba(255,255,255,0.5); font-size:14px; }

    /* Wave & dots */
    .indicators { height:22px; display:flex; align-items:center; justify-content:center; gap:8px; }
    .wave { display:none; gap:4px; align-items:flex-end; height:20px; }
    .wave.on { display:flex; }
    .wave span { display:block; width:3px; border-radius:2px; background:rgba(180,230,200,0.7); animation:wv 1.1s ease-in-out infinite; }
    .wave span:nth-child(1){height:8px;animation-delay:0s}
    .wave span:nth-child(2){height:14px;animation-delay:0.15s}
    .wave span:nth-child(3){height:20px;animation-delay:0.3s}
    .wave span:nth-child(4){height:14px;animation-delay:0.45s}
    .wave span:nth-child(5){height:8px;animation-delay:0.6s}
    @keyframes wv { 0%,100%{transform:scaleY(0.4);opacity:0.5} 50%{transform:scaleY(1);opacity:1} }

    .dots { display:none; gap:6px; align-items:center; }
    .dots.on { display:flex; }
    .dots span { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.35); animation:db 1.2s ease-in-out infinite; }
    .dots span:nth-child(1){animation-delay:0s}
    .dots span:nth-child(2){animation-delay:0.2s}
    .dots span:nth-child(3){animation-delay:0.4s}
    @keyframes db { 0%,80%,100%{transform:translateY(0);opacity:0.35} 40%{transform:translateY(-6px);opacity:1} }

    /* Mic */
    .mic-wrap { display:flex; flex-direction:column; align-items:center; gap:10px; }
    .mic-btn {
      width:68px; height:68px; border-radius:50%;
      border:1.5px solid rgba(255,255,255,0.22);
      background:rgba(255,255,255,0.06);
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:all 0.25s ease; outline:none;
    }
    .mic-btn:hover { background:rgba(255,255,255,0.12); border-color:rgba(255,255,255,0.38); }
    .mic-btn.active { background:rgba(180,230,200,0.13); border-color:rgba(180,230,200,0.5); animation:pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(180,230,200,0.4)} 70%{box-shadow:0 0 0 16px rgba(180,230,200,0)} 100%{box-shadow:0 0 0 0 rgba(180,230,200,0)} }
    .mic-btn svg { width:26px; height:26px; fill:rgba(255,255,255,0.65); transition:fill 0.25s; }
    .mic-btn.active svg { fill:rgba(180,230,200,0.9); }
    .mic-hint { font-size:10px; letter-spacing:0.12em; color:rgba(255,255,255,0.22); text-transform:uppercase; }
    .status { font-size:11px; letter-spacing:0.1em; color:rgba(255,255,255,0.25); text-transform:uppercase; height:14px; }
    .status.on { color:rgba(180,230,200,0.65); }

    /* Practices tab */
    .practices-view { display:none; flex-direction:column; max-height:420px; }
    .practices-view.visible { display:flex; }
    .practices-scroll { overflow-y:auto; flex:1; padding:16px 20px; }
    .practices-scroll::-webkit-scrollbar { width:4px; }
    .practices-scroll::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:2px; }

    .practice-item {
      display:flex; align-items:center; gap:12px;
      padding:12px 14px; margin-bottom:8px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:12px; cursor:pointer;
      transition:background 0.2s;
    }
    .practice-item:hover { background:rgba(255,255,255,0.09); }
    .practice-item.playing { border-color:rgba(180,230,200,0.4); background:rgba(180,230,200,0.07); }

    .practice-icon { font-size:18px; flex-shrink:0; }
    .practice-info { flex:1; min-width:0; }
    .practice-title { font-size:14px; color:rgba(255,255,255,0.82); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .practice-meta { font-size:11px; color:rgba(255,255,255,0.35); margin-top:2px; }

    .heart-btn {
      background:none; border:none; cursor:pointer;
      font-size:18px; opacity:0.4; transition:all 0.2s; flex-shrink:0; padding:4px;
    }
    .heart-btn.fav { opacity:1; }
    .heart-btn:hover { opacity:0.8; transform:scale(1.15); }

    .no-practices { text-align:center; padding:32px 20px; color:rgba(255,255,255,0.3); font-size:14px; font-style:italic; }

    /* Practice player overlay */
    .player-overlay {
      display:none; position:absolute; inset:0; z-index:10;
      background:rgba(10,15,13,0.92); backdrop-filter:blur(12px);
      border-radius:22px; flex-direction:column;
      align-items:center; justify-content:center; gap:20px; padding:32px;
    }
    .player-overlay.visible { display:flex; }
    .player-title { font-size:18px; color:rgba(255,255,255,0.88); text-align:center; }
    .player-text { font-size:15px; line-height:1.8; color:rgba(255,255,255,0.7); text-align:center; font-style:italic; max-height:200px; overflow-y:auto; }
    .player-close { background:none; border:1px solid rgba(255,255,255,0.2); color:rgba(255,255,255,0.5); padding:8px 20px; border-radius:20px; cursor:pointer; font-size:12px; letter-spacing:0.1em; text-transform:uppercase; transition:all 0.2s; }
    .player-close:hover { border-color:rgba(255,255,255,0.4); color:rgba(255,255,255,0.8); }
  </style>
</head>
<body>
  <div class="slideshow" id="slideshow"></div>
  <div class="veil"></div>

  <div class="panel">
    <div class="glass" style="position:relative">

      <div class="header">
        <div class="wordmark">Deeper Mindfulness</div>
      </div>

      <div class="tabs">
        <button class="tab active" id="tabTalk">Talk</button>
        <button class="tab" id="tabPractices">Practices</button>
      </div>

      <!-- Talk -->
      <div class="talk-view" id="talkView">
        <div class="arc-banner" id="arcBanner"></div>
        <div class="transcript-area">
          <p class="transcript-text" id="transcript">—</p>
        </div>
        <div class="indicators">
          <div class="wave" id="wave"><span></span><span></span><span></span><span></span><span></span></div>
          <div class="dots" id="dots"><span></span><span></span><span></span></div>
        </div>
        <div class="mic-wrap">
          <button class="mic-btn" id="micBtn">
            <svg viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v7a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm0 2a2 2 0 0 0-2 2v7a2 2 0 0 0 4 0V5a2 2 0 0 0-2-2zm-7 9a1 1 0 0 1 1 1 6 6 0 0 0 12 0 1 1 0 0 1 2 0 8 8 0 0 1-7 7.938V23h3a1 1 0 0 1 0 2H8a1 1 0 0 1 0-2h3v-2.062A8 8 0 0 1 4 13a1 1 0 0 1 1-1z"/></svg>
          </button>
          <span class="mic-hint" id="micHint">listening automatically</span>
        </div>
        <div class="status" id="status"></div>
      </div>

      <!-- Practices -->
      <div class="practices-view" id="practicesView">
        <div class="practices-scroll" id="practicesList">
          <div class="no-practices" id="noPractices">No practices yet.</div>
        </div>
      </div>

      <!-- Player overlay -->
      <div class="player-overlay" id="playerOverlay">
        <div class="player-title" id="playerTitle"></div>
        <div class="player-text" id="playerText"></div>
        <button class="player-close" id="playerClose">Close</button>
      </div>

    </div>
  </div>

  <script>
    // Slideshow
    const slides = [
      'https://images.unsplash.com/photo-1505118380757-91f5f5632de0?w=1600&q=80',
      'https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=1600&q=80',
      'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=1600&q=80',
      'https://images.unsplash.com/photo-1448375240586-882707db888b?w=1600&q=80',
      'https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=1600&q=80',
      'https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?w=1600&q=80',
      'https://images.unsplash.com/photo-1465146344425-f00d5f5c8f07?w=1600&q=80',
    ];
    const ss = document.getElementById('slideshow');
    const slideEls = slides.map((url, i) => {
      const d = document.createElement('div');
      d.className = 'slide' + (i === 0 ? ' active' : '');
      d.style.backgroundImage = `url('${url}')`;
      ss.appendChild(d); return d;
    });
    let cur = 0;
    setInterval(() => {
      slideEls[cur].classList.remove('active');
      cur = (cur + 1) % slideEls.length;
      slideEls[cur].classList.add('active');
    }, 9000);

    // State
    const clientId = new URLSearchParams(location.search).get('client') || '';
    const wsUrl = (location.protocol==='https:'?'wss':'ws')+'://'+location.host+'?type=client&client='+clientId;
    const ws = new WebSocket(wsUrl);

    const transcriptEl = document.getElementById('transcript');
    const statusEl     = document.getElementById('status');
    const micBtn       = document.getElementById('micBtn');
    const micHint      = document.getElementById('micHint');
    const waveEl       = document.getElementById('wave');
    const dotsEl       = document.getElementById('dots');
    const arcBanner    = document.getElementById('arcBanner');

    let isListening=false, mediaStream=null, mediaRecorder=null, dgWs=null;

    function setState(s) {
      waveEl.classList.remove('on'); dotsEl.classList.remove('on');
      micBtn.classList.remove('active'); statusEl.classList.remove('on');
      if(s==='idle'){ statusEl.textContent=''; micHint.textContent='hold to speak'; }
      else if(s==='listening'){ micBtn.classList.add('active'); statusEl.classList.add('on'); statusEl.textContent='listening'; micHint.textContent='release when done'; }
      else if(s==='processing'){ dotsEl.classList.add('on'); micHint.textContent='hold to speak'; }
      else if(s==='speaking'){ waveEl.classList.add('on'); }
    }

    function playAudio(b64) {
      return new Promise(res => {
        const bytes=atob(b64), arr=new Uint8Array(bytes.length);
        for(let i=0;i<bytes.length;i++) arr[i]=bytes.charCodeAt(i);
        const audio=new Audio(URL.createObjectURL(new Blob([arr],{type:'audio/mpeg'})));
        audio.onended=res; audio.onerror=res; audio.play().catch(res);
      });
    }

    ws.onmessage = async (e) => {
      const msg = JSON.parse(e.data);
      if(msg.type==='greeting'){ transcriptEl.textContent=msg.text; transcriptEl.className='transcript-text'; }
      if(msg.type==='audio'){
        setState('speaking');
        await playAudio(msg.data);
        setState('idle');
        // Auto-open mic after bot finishes speaking
        setTimeout(() => startListening(), 400);
      }
      if(msg.type==='listening_started'){ setState('listening'); }
      if(msg.type==='listening_stopped'){ setState('processing'); }
      if(msg.type==='interim_transcript'){ transcriptEl.textContent=msg.text; transcriptEl.className='transcript-text dim'; }
      if(msg.type==='final_transcript'){ transcriptEl.textContent=msg.text; transcriptEl.className='transcript-text user'; setState('processing'); }
      if(msg.type==='response_text'){ transcriptEl.textContent=msg.text; transcriptEl.className='transcript-text'; }
    };

    async function startListening() {
      if(isListening) return;
      try { mediaStream=await navigator.mediaDevices.getUserMedia({audio:true}); }
      catch(e){ statusEl.textContent='mic access needed'; return; }
      isListening=true;
      ws.send(JSON.stringify({type:'start_listening'}));
      mediaRecorder=new MediaRecorder(mediaStream,{mimeType:'audio/webm;codecs=opus'});
      mediaRecorder.ondataavailable=(e)=>{
        if(e.data.size>0){
          const r=new FileReader(); r.onload=()=>ws.send(JSON.stringify({type:'audio_chunk',data:r.result.split(',')[1]}));
          r.readAsDataURL(e.data);
        }
      };
      mediaRecorder.start(200);
    }

    function stopListening() {
      if(!isListening) return; isListening=false;
      mediaRecorder?.state!=='inactive' && mediaRecorder.stop();
      mediaStream?.getTracks().forEach(t=>t.stop()); mediaStream=null;
      ws.send(JSON.stringify({type:'stop_listening'}));
    }

    micBtn.addEventListener('mousedown', e=>{ e.preventDefault(); startListening(); });
    micBtn.addEventListener('mouseup', stopListening);
    micBtn.addEventListener('mouseleave', stopListening);
    micBtn.addEventListener('touchstart', e=>{ e.preventDefault(); startListening(); },{passive:false});
    micBtn.addEventListener('touchend', e=>{ e.preventDefault(); stopListening(); });
    document.addEventListener('keydown', e=>{ if(e.code==='Space'&&!e.repeat){ e.preventDefault(); startListening(); } });
    document.addEventListener('keyup', e=>{ if(e.code==='Space'){ e.preventDefault(); stopListening(); } });

    // Tabs
    const talkView      = document.getElementById('talkView');
    const practicesView = document.getElementById('practicesView');
    document.getElementById('tabTalk').addEventListener('click', ()=>{
      document.getElementById('tabTalk').classList.add('active');
      document.getElementById('tabPractices').classList.remove('active');
      talkView.style.display=''; practicesView.classList.remove('visible');
    });
    document.getElementById('tabPractices').addEventListener('click', ()=>{
      document.getElementById('tabPractices').classList.add('active');
      document.getElementById('tabTalk').classList.remove('active');
      talkView.style.display='none'; practicesView.classList.add('visible');
      loadPractices();
    });

    // Practices
    async function loadPractices() {
      if(!clientId) return;
      const res  = await fetch(`/api/clients/${clientId}/practices`);
      const list = await res.json();
      renderPractices(list);
    }

    function renderPractices(list) {
      const el = document.getElementById('practicesList');
      const np = document.getElementById('noPractices');
      if(!list.length){ np.style.display=''; el.innerHTML=''; el.appendChild(np); return; }
      np.style.display='none';
      el.innerHTML='';
      list.forEach(p => {
        const item = document.createElement('div');
        item.className='practice-item';
        item.innerHTML=`
          <span class="practice-icon">${p.type==='audio'?'🎵':'📄'}</span>
          <div class="practice-info">
            <div class="practice-title">${p.title}</div>
            <div class="practice-meta">${p.type==='audio'?'Audio':'Text'} · Used ${p.use_count} times</div>
          </div>
          <button class="heart-btn ${p.is_favourite?'fav':''}" data-id="${p.id}">♥</button>
        `;
        // Heart toggle
        item.querySelector('.heart-btn').addEventListener('click', async(e)=>{
          e.stopPropagation();
          await fetch(`/api/practices/${p.id}/favourite`,{method:'PATCH'});
          loadPractices();
        });
        // Open practice
        item.addEventListener('click', ()=>openPractice(p));
        el.appendChild(item);
      });
    }

    function openPractice(p) {
      const overlay = document.getElementById('playerOverlay');
      document.getElementById('playerTitle').textContent=p.title;
      if(p.type==='text'){
        document.getElementById('playerText').textContent=p.content;
        overlay.classList.add('visible');
        fetch(`/api/practices/${p.id}/use`,{method:'PATCH'});
      } else {
        // Play audio file
        const audio=new Audio(`/uploads/${p.filename}`);
        document.getElementById('playerText').textContent='Playing…';
        overlay.classList.add('visible');
        audio.play();
        fetch(`/api/practices/${p.id}/use`,{method:'PATCH'});
        audio.onended=()=>{ document.getElementById('playerText').textContent='Done.'; };
      }
    }

    document.getElementById('playerClose').addEventListener('click',()=>{
      document.getElementById('playerOverlay').classList.remove('visible');
    });
  </script>
</body>
</html>

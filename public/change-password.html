<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Set Password — Deeper Mindfulness</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; font-family:'Georgia',serif; background:#0a0f0d; display:flex; align-items:center; justify-content:center; }
    .veil { position:fixed; inset:0; background:rgba(0,0,0,0.7); }
    .panel { position:relative; z-index:2; width:100%; max-width:380px; padding:20px; }
    .glass { background:rgba(255,255,255,0.07); backdrop-filter:blur(24px); border:1px solid rgba(255,255,255,0.12); border-radius:20px; padding:40px 36px 36px; display:flex; flex-direction:column; gap:24px; }
    .title { text-align:center; }
    .title h2 { font-size:18px; color:rgba(255,255,255,0.82); font-weight:normal; }
    .title p { font-size:13px; color:rgba(255,255,255,0.35); margin-top:8px; line-height:1.6; }
    .field { display:flex; flex-direction:column; gap:6px; }
    .field label { font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.35); }
    .field input { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12); border-radius:10px; padding:12px 14px; font-size:15px; color:rgba(255,255,255,0.85); font-family:'Georgia',serif; outline:none; transition:border-color 0.2s; }
    .field input:focus { border-color:rgba(180,230,200,0.4); }
    .error { font-size:13px; color:rgba(255,140,120,0.85); text-align:center; min-height:18px; }
    .submit-btn { width:100%; padding:13px; border-radius:10px; border:1px solid rgba(180,230,200,0.3); background:rgba(180,230,200,0.1); color:rgba(180,230,200,0.85); font-size:13px; letter-spacing:0.12em; text-transform:uppercase; cursor:pointer; transition:all 0.2s; font-family:'Georgia',serif; }
    .submit-btn:hover { background:rgba(180,230,200,0.18); }
    .submit-btn:disabled { opacity:0.5; cursor:not-allowed; }
  </style>
</head>
<body>
  <div class="veil"></div>
  <div class="panel">
    <div class="glass">
      <div class="title">
        <h2>Set your password</h2>
        <p>This is your first sign in. Please choose a password you will remember.</p>
      </div>
      <div class="field">
        <label>New password</label>
        <div style="position:relative">
          <input type="password" id="password" placeholder="At least 8 characters" style="padding-right:44px"/>
          <button type="button" onclick="togglePw('password','eye1o','eye1c')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,0.3);cursor:pointer;padding:4px;display:flex;align-items:center">
            <svg id="eye1o" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eye1c" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <div class="field">
        <label>Confirm password</label>
        <div style="position:relative">
          <input type="password" id="confirm" placeholder="Same again" style="padding-right:44px"/>
          <button type="button" onclick="togglePw('confirm','eye2o','eye2c')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,0.3);cursor:pointer;padding:4px;display:flex;align-items:center">
            <svg id="eye2o" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eye2c" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <div class="error" id="error"></div>
      <button class="submit-btn" id="submitBtn">Set password &amp; continue</button>
    </div>
  </div>
  <script>
    function togglePw(inputId, openId, closedId) {
      const input = document.getElementById(inputId);
      const open  = document.getElementById(openId);
      const closed = document.getElementById(closedId);
      if (input.type === 'password') {
        input.type = 'text';
        open.style.display = 'none';
        closed.style.display = '';
      } else {
        input.type = 'password';
        open.style.display = '';
        closed.style.display = 'none';
      }
    }

    async function submit() {
      const p1 = document.getElementById('password').value;
      const p2 = document.getElementById('confirm').value;
      const err = document.getElementById('error');
      const btn = document.getElementById('submitBtn');
      if (p1.length < 8) { err.textContent = 'Password must be at least 8 characters.'; return; }
      if (p1 !== p2) { err.textContent = 'Passwords do not match.'; return; }
      btn.disabled = true; btn.textContent = 'Saving…'; err.textContent = '';
      const res = await fetch('/api/change-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: p1 })
      });
      const data = await res.json();
      if (data.redirect) { window.location.href = data.redirect; }
      else { err.textContent = data.error || 'Something went wrong.'; btn.disabled = false; btn.textContent = 'Set password & continue'; }
    }
    document.getElementById('submitBtn').addEventListener('click', submit);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  </script>
</body>
</html>

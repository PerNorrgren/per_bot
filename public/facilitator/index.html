<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Per Bot — Facilitator</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; font-family:'Georgia',serif; background:#0d1210; color:rgba(255,255,255,0.82); overflow:hidden; }

    .app { display:flex; height:100vh; }

    /* Sidebar */
    .sidebar {
      width:240px; flex-shrink:0;
      background:rgba(255,255,255,0.04);
      border-right:1px solid rgba(255,255,255,0.07);
      display:flex; flex-direction:column;
      overflow:hidden;
    }
    .sidebar-header { padding:20px 16px 14px; border-bottom:1px solid rgba(255,255,255,0.07); }
    .logo { font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:rgba(255,255,255,0.35); }
    .logo-name { font-size:16px; color:rgba(255,255,255,0.75); margin-top:4px; letter-spacing:0.05em; }

    .new-client-btn {
      margin:12px 12px 0;
      background:rgba(180,230,200,0.1); border:1px solid rgba(180,230,200,0.25);
      color:rgba(180,230,200,0.8); font-size:11px; letter-spacing:0.12em;
      text-transform:uppercase; padding:9px 12px; border-radius:8px;
      cursor:pointer; transition:all 0.2s; width:calc(100% - 24px);
    }
    .new-client-btn:hover { background:rgba(180,230,200,0.18); }

    .client-list { flex:1; overflow-y:auto; padding:10px 8px; }
    .client-list::-webkit-scrollbar { width:3px; }
    .client-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); }

    .client-item {
      padding:9px 10px; border-radius:8px; cursor:pointer;
      font-size:13px; color:rgba(255,255,255,0.55);
      transition:all 0.15s; margin-bottom:2px;
    }
    .client-item:hover { background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.8); }
    .client-item.active { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.9); }

    .sidebar-footer { padding:14px 12px; border-top:1px solid rgba(255,255,255,0.07); }
    .fog-label { font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-bottom:8px; }
    .fog-btns { display:flex; gap:6px; }
    .fog-btn {
      flex:1; padding:6px; border-radius:6px; border:1px solid rgba(255,255,255,0.12);
      background:none; color:rgba(255,255,255,0.4); font-size:11px; cursor:pointer; transition:all 0.2s;
    }
    .fog-btn.active { background:rgba(180,230,200,0.12); border-color:rgba(180,230,200,0.35); color:rgba(180,230,200,0.8); }

    /* Main area */
    .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

    /* Top bar */
    .topbar {
      padding:14px 20px; border-bottom:1px solid rgba(255,255,255,0.07);
      display:flex; align-items:center; gap:12px; flex-wrap:wrap;
    }
    .client-name { font-size:17px; color:rgba(255,255,255,0.85); flex:1; }
    .no-client { font-size:14px; color:rgba(255,255,255,0.3); font-style:italic; }

    .action-btn {
      padding:7px 14px; border-radius:8px; border:1px solid rgba(255,255,255,0.15);
      background:none; color:rgba(255,255,255,0.55); font-size:11px;
      letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; transition:all 0.2s;
    }
    .action-btn:hover { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.85); }
    .action-btn.primary { border-color:rgba(180,230,200,0.35); color:rgba(180,230,200,0.75); }
    .action-btn.primary:hover { background:rgba(180,230,200,0.1); }
    .action-btn.danger { border-color:rgba(255,160,120,0.35); color:rgba(255,160,120,0.75); }
    .action-btn.danger:hover { background:rgba(255,160,120,0.1); }

    /* Content area */
    .content { flex:1; display:flex; overflow:hidden; }

    /* Left column: arc + sessions + practices */
    .left-col {
      width:320px; flex-shrink:0;
      border-right:1px solid rgba(255,255,255,0.07);
      display:flex; flex-direction:column; overflow:hidden;
    }

    .section { border-bottom:1px solid rgba(255,255,255,0.06); }
    .section-header {
      padding:12px 16px 10px; display:flex; align-items:center; justify-content:space-between;
      cursor:pointer;
    }
    .section-title { font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:rgba(255,255,255,0.35); }
    .section-toggle { font-size:12px; color:rgba(255,255,255,0.25); }
    .section-body { padding:0 16px 14px; }

    .arc-text {
      font-size:13px; line-height:1.7; color:rgba(255,255,255,0.65);
      min-height:60px; outline:none; width:100%;
      background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
      border-radius:8px; padding:10px 12px; resize:none;
      font-family:'Georgia',serif; color:rgba(255,255,255,0.75);
    }
    .arc-text:focus { border-color:rgba(180,230,200,0.3); outline:none; }
    .save-arc-btn {
      margin-top:8px; padding:5px 12px; border-radius:6px;
      border:1px solid rgba(180,230,200,0.25); background:none;
      color:rgba(180,230,200,0.65); font-size:10px; letter-spacing:0.1em;
      text-transform:uppercase; cursor:pointer; transition:all 0.2s;
    }
    .save-arc-btn:hover { background:rgba(180,230,200,0.1); }

    .sessions-list { max-height:160px; overflow-y:auto; }
    .sessions-list::-webkit-scrollbar { width:3px; }
    .session-item { padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.04); font-size:12px; }
    .session-date { color:rgba(255,255,255,0.3); margin-bottom:3px; }
    .session-type { display:inline-block; font-size:10px; letter-spacing:0.08em; padding:2px 6px; border-radius:4px; background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.4); margin-bottom:4px; }
    .session-summary { color:rgba(255,255,255,0.55); line-height:1.5; }

    .practices-section { flex:1; overflow:hidden; display:flex; flex-direction:column; }
    .practices-list { flex:1; overflow-y:auto; padding:0 16px 12px; }
    .fac-practice-item {
      display:flex; align-items:center; gap:10px;
      padding:8px 10px; margin-bottom:6px;
      background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07);
      border-radius:8px; font-size:12px;
    }
    .fac-practice-info { flex:1; min-width:0; }
    .fac-practice-title { color:rgba(255,255,255,0.75); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .fac-practice-meta { color:rgba(255,255,255,0.3); font-size:11px; margin-top:1px; }
    .fac-heart { font-size:14px; opacity:0.4; }
    .fac-heart.fav { opacity:1; }

    .add-practice-wrap { padding:10px 16px 14px; }
    .add-practice-btn {
      width:100%; padding:8px; border-radius:8px;
      border:1px dashed rgba(255,255,255,0.15); background:none;
      color:rgba(255,255,255,0.35); font-size:11px; letter-spacing:0.1em;
      text-transform:uppercase; cursor:pointer; transition:all 0.2s;
    }
    .add-practice-btn:hover { border-color:rgba(255,255,255,0.3); color:rgba(255,255,255,0.6); }

    /* Right column: conversation */
    .right-col { flex:1; display:flex; flex-direction:column; overflow:hidden; }

    .conversation { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:14px; }
    .conversation::-webkit-scrollbar { width:4px; }
    .conversation::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); }

    .msg { max-width:85%; }
    .msg.bot { align-self:flex-start; }
    .msg.user { align-self:flex-end; }
    .msg-bubble {
      padding:12px 16px; border-radius:14px; font-size:14px; line-height:1.65;
    }
    .msg.bot .msg-bubble { background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.82); border-bottom-left-radius:4px; }
    .msg.user .msg-bubble { background:rgba(180,230,200,0.1); color:rgba(180,230,200,0.85); border-bottom-right-radius:4px; }
    .msg-label { font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.25); margin-bottom:4px; padding:0 4px; }
    .msg.user .msg-label { text-align:right; }

    .explanation-bubble {
      background:rgba(220,200,255,0.08); border:1px solid rgba(220,200,255,0.15);
      border-radius:14px; padding:14px 16px; font-size:13px; line-height:1.7;
      color:rgba(220,200,255,0.8); align-self:flex-start; max-width:90%;
    }

    .summary-bubble {
      background:rgba(180,230,200,0.06); border:1px solid rgba(180,230,200,0.2);
      border-radius:14px; padding:16px; font-size:13px; line-height:1.7;
      color:rgba(180,230,200,0.8); align-self:flex-start; max-width:95%;
    }
    .summary-bubble h4 { font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:rgba(180,230,200,0.5); margin-bottom:10px; }
    .arc-update-box { margin-top:14px; padding-top:14px; border-top:1px solid rgba(180,230,200,0.15); }
    .arc-update-text { font-style:italic; color:rgba(255,255,255,0.65); }
    .accept-arc-btn {
      margin-top:10px; padding:6px 16px; border-radius:6px;
      border:1px solid rgba(180,230,200,0.3); background:none;
      color:rgba(180,230,200,0.7); font-size:11px; letter-spacing:0.1em;
      text-transform:uppercase; cursor:pointer; transition:all 0.2s;
    }
    .accept-arc-btn:hover { background:rgba(180,230,200,0.1); }

    /* Input area */
    .input-area {
      padding:14px 16px; border-top:1px solid rgba(255,255,255,0.07);
      display:flex; align-items:center; gap:10px;
    }
    .text-input {
      flex:1; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
      border-radius:10px; padding:10px 14px; font-size:14px; color:rgba(255,255,255,0.82);
      font-family:'Georgia',serif; outline:none; resize:none;
    }
    .text-input:focus { border-color:rgba(255,255,255,0.22); }
    .text-input::placeholder { color:rgba(255,255,255,0.25); }

    .mic-btn-small {
      width:42px; height:42px; border-radius:50%; flex-shrink:0;
      border:1.5px solid rgba(255,255,255,0.18); background:rgba(255,255,255,0.05);
      cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s;
    }
    .mic-btn-small:hover { background:rgba(255,255,255,0.1); }
    .mic-btn-small.active { background:rgba(180,230,200,0.13); border-color:rgba(180,230,200,0.5); animation:pulse 2s ease-in-out infinite; }
    .mic-btn-small svg { width:18px; height:18px; fill:rgba(255,255,255,0.55); }
    .mic-btn-small.active svg { fill:rgba(180,230,200,0.9); }
    @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(180,230,200,0.4)} 70%{box-shadow:0 0 0 12px rgba(180,230,200,0)} 100%{box-shadow:0 0 0 0 rgba(180,230,200,0)} }

    .send-btn {
      width:42px; height:42px; border-radius:50%; flex-shrink:0;
      border:1.5px solid rgba(255,255,255,0.18); background:rgba(255,255,255,0.05);
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      color:rgba(255,255,255,0.55); font-size:16px; transition:all 0.2s;
    }
    .send-btn:hover { background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.85); }

    /* Modals */
    .modal-overlay {
      display:none; position:fixed; inset:0; z-index:100;
      background:rgba(0,0,0,0.6); backdrop-filter:blur(8px);
      align-items:center; justify-content:center;
    }
    .modal-overlay.visible { display:flex; }
    .modal {
      background:#141a17; border:1px solid rgba(255,255,255,0.12);
      border-radius:16px; padding:28px; width:100%; max-width:400px;
    }
    .modal h3 { font-size:15px; color:rgba(255,255,255,0.85); margin-bottom:20px; }
    .modal input, .modal textarea {
      width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12);
      border-radius:8px; padding:10px 14px; font-size:14px; color:rgba(255,255,255,0.82);
      font-family:'Georgia',serif; outline:none; margin-bottom:12px;
    }
    .modal textarea { resize:vertical; min-height:80px; }
    .modal-btns { display:flex; gap:10px; justify-content:flex-end; margin-top:8px; }
    .modal-cancel {
      padding:8px 18px; border-radius:8px; border:1px solid rgba(255,255,255,0.15);
      background:none; color:rgba(255,255,255,0.5); cursor:pointer; font-size:13px;
    }
    .modal-confirm {
      padding:8px 18px; border-radius:8px; border:1px solid rgba(180,230,200,0.3);
      background:rgba(180,230,200,0.1); color:rgba(180,230,200,0.8); cursor:pointer; font-size:13px;
    }
    .modal-type-toggle { display:flex; gap:8px; margin-bottom:12px; }
    .type-btn { flex:1; padding:8px; border-radius:8px; border:1px solid rgba(255,255,255,0.12); background:none; color:rgba(255,255,255,0.4); cursor:pointer; font-size:12px; transition:all 0.2s; }
    .type-btn.active { border-color:rgba(180,230,200,0.35); color:rgba(180,230,200,0.75); background:rgba(180,230,200,0.08); }

    .wave-small { display:none; gap:3px; align-items:flex-end; height:16px; }
    .wave-small.on { display:flex; }
    .wave-small span { display:block; width:2px; border-radius:2px; background:rgba(180,230,200,0.7); animation:wv 1.1s ease-in-out infinite; }
    .wave-small span:nth-child(1){height:6px;animation-delay:0s}
    .wave-small span:nth-child(2){height:10px;animation-delay:0.15s}
    .wave-small span:nth-child(3){height:16px;animation-delay:0.3s}
    .wave-small span:nth-child(4){height:10px;animation-delay:0.45s}
    .wave-small span:nth-child(5){height:6px;animation-delay:0.6s}
    @keyframes wv { 0%,100%{transform:scaleY(0.4);opacity:0.5} 50%{transform:scaleY(1);opacity:1} }

    .empty-state { flex:1; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,0.2); font-size:14px; font-style:italic; }
  </style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header" style="padding:16px 14px;border-bottom:1px solid rgba(255,255,255,0.07);position:relative">
      <div style="font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.3)">Deeper Mindfulness</div>
      <button onclick="toggleMenu()" style="display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;padding:4px 0;margin-top:2px">
        <span style="font-size:16px;color:rgba(255,255,255,0.78);font-family:Georgia,serif">Facilitator</span>
        <span style="color:rgba(255,255,255,0.3);font-size:11px">▾</span>
      </button>
      <div id="facMenu" style="display:none;position:absolute;top:100%;left:0;right:0;background:#1a2420;border:1px solid rgba(255,255,255,0.1);border-top:none;z-index:50">
        <button onclick="openChangePw();toggleMenu()" style="width:100%;padding:12px 16px;background:none;border:none;border-bottom:1px solid rgba(255,255,255,0.06);color:rgba(255,255,255,0.6);font-size:13px;font-family:Georgia,serif;cursor:pointer;text-align:left">Change password</button>
        <button onclick="logout()" style="width:100%;padding:12px 16px;background:none;border:none;color:rgba(255,255,255,0.4);font-size:13px;font-family:Georgia,serif;cursor:pointer;text-align:left">Sign out</button>
      </div>
    </div>
      <button onclick="openChangePw()" style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.25);background:none;border:1px solid rgba(255,255,255,0.08);padding:5px 10px;border-radius:6px;cursor:pointer;margin-right:4px">Password</button>
      <button onclick="logout()" style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.25);background:none;border:1px solid rgba(255,255,255,0.08);padding:5px 10px;border-radius:6px;cursor:pointer">Out</button>
    </div>
    <button class="new-client-btn" id="newClientBtn">+ New Client</button>
    <div class="client-list" id="clientList"></div>
    <div style="padding:8px 12px"><label style="font-size:11px;color:rgba(255,255,255,0.25);cursor:pointer"><input type="checkbox" id="showArchived" style="margin-right:6px">Show archived</label></div>
    <div class="sidebar-footer">
      <div class="fog-label">Language level</div>
      <div class="fog-btns">
        <button class="fog-btn" data-fog="6">Plain</button>
        <button class="fog-btn active" data-fog="12">Clinical</button>
        <button class="fog-btn" data-fog="18">Technical</button>
      </div>
      <div style="margin-top:14px;display:flex;flex-direction:column;gap:8px">
        <label style="font-size:11px;color:rgba(255,255,255,0.35);cursor:pointer;display:flex;align-items:center;gap:8px">
          <input type="checkbox" id="voiceOn" style="accent-color:#b4e6c8">
          Voice response
        </label>
        <label style="font-size:11px;color:rgba(255,255,255,0.35);cursor:pointer;display:flex;align-items:center;gap:8px">
          <input type="checkbox" id="detailedOn" style="accent-color:#b4e6c8">
          Detailed (default: short)
        </label>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <!-- Top bar -->
    <div class="topbar" id="topbar">
      <div class="no-client" id="noClientMsg">Select or create a client to begin</div>
      <div class="client-name" id="clientNameDisplay" style="display:none"></div>
      <div id="sessionActions" style="display:none; display:flex; gap:8px; flex-wrap:wrap">
        <button class="action-btn primary" id="explainBtn">Explain to me</button>
        <button class="action-btn" id="addPracticeBtn">Add practice</button>
        <button class="action-btn" id="archiveBtn">Archive client</button>
        <button class="action-btn danger" id="endSessionBtn">End session</button>
      </div>
    </div>

    <!-- Content -->
    <div class="content" id="content">
      <div class="empty-state" id="emptyState">Select a client from the sidebar</div>

      <!-- Left col (hidden until client selected) -->
      <div class="left-col" id="leftCol" style="display:none">
        <!-- Arc -->
        <div class="section">
          <div class="section-header">
            <span class="section-title">Arc / Development Plan</span>
          </div>
          <div class="section-body">
            <textarea class="arc-text" id="arcText" rows="4" placeholder="Not yet established — will form as sessions accumulate."></textarea>
            <button class="save-arc-btn" id="saveArcBtn">Save arc</button>
          </div>
        </div>

        <!-- Sessions -->
        <div class="section">
          <div class="section-header">
            <span class="section-title">Sessions</span>
            <span class="section-toggle" id="sessionCount"></span>
          </div>
          <div class="section-body">
            <div class="sessions-list" id="sessionsList"></div>
          </div>
        </div>

        <!-- Practices -->
        <div class="section practices-section">
          <div class="section-header">
            <span class="section-title">Practices</span>
          </div>
          <div class="practices-list" id="facPracticesList"></div>
          <div class="add-practice-wrap">
            <button class="add-practice-btn" id="addPracticeBtn2">+ Add practice</button>
          </div>
        </div>
      </div>

      <!-- Right col -->
      <div class="right-col" id="rightCol" style="display:none">
        <div class="conversation" id="conversation"></div>
        <div class="input-area">
          <div class="wave-small" id="waveSmall"><span></span><span></span><span></span><span></span><span></span></div>
          <textarea class="text-input" id="textInput" rows="1" placeholder="Type or hold mic to speak…"></textarea>
          <button class="mic-btn-small" id="micBtnSmall">
            <svg viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v7a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm0 2a2 2 0 0 0-2 2v7a2 2 0 0 0 4 0V5a2 2 0 0 0-2-2zm-7 9a1 1 0 0 1 1 1 6 6 0 0 0 12 0 1 1 0 0 1 2 0 8 8 0 0 1-7 7.938V23h3a1 1 0 0 1 0 2H8a1 1 0 0 1 0-2h3v-2.062A8 8 0 0 1 4 13a1 1 0 0 1 1-1z"/></svg>
          </button>
          <button class="send-btn" id="sendBtn">↑</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- New Client Modal -->
<div class="modal-overlay" id="newClientModal">
  <div class="modal">
    <h3>New client</h3>
    <div>
      <label style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.35);display:block;margin-bottom:5px">Name</label>
      <input type="text" id="newClientName" placeholder="First name"/>
    </div>
    <div>
      <label style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.35);display:block;margin-bottom:5px">Email <span style="color:rgba(255,255,255,0.2);font-size:10px;letter-spacing:0">(optional — needed for login)</span></label>
      <input type="email" id="newClientEmail" placeholder="client@example.com"/>
    </div>
    <div style="display:flex;gap:10px">
      <div style="flex:1">
        <label style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.35);display:block;margin-bottom:5px">Programme</label>
        <select id="newClientCat" onchange="loadNewClientSubs()" style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:10px 13px;font-size:14px;color:rgba(255,255,255,0.82);font-family:Georgia,serif;outline:none">
          <option value="">Select…</option>
        </select>
      </div>
      <div style="flex:1">
        <label style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.35);display:block;margin-bottom:5px">Track</label>
        <select id="newClientSub" style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:10px 13px;font-size:14px;color:rgba(255,255,255,0.82);font-family:Georgia,serif;outline:none">
          <option value="">Select…</option>
        </select>
      </div>
    </div>
    <div id="newClientErr" style="font-size:12px;color:rgba(255,120,100,0.8);min-height:16px"></div>
    <div class="modal-btns">
      <button class="modal-cancel" id="cancelNewClient">Cancel</button>
      <button class="modal-confirm" id="confirmNewClient">Create</button>
    </div>
  </div>
</div>

<!-- Client Created Modal -->
<div class="modal-overlay" id="clientCreatedModal">
  <div class="modal">
    <h3>Client created</h3>
    <div id="clientCreatedBody"></div>
    <div class="modal-btns">
      <button class="modal-confirm" onclick="document.getElementById('clientCreatedModal').classList.remove('visible');loadClients()">Done</button>
    </div>
  </div>
</div>

<!-- Add Practice Modal -->
<div class="modal-overlay" id="addPracticeModal">
  <div class="modal">
    <h3>Add practice</h3>
    <div class="modal-type-toggle">
      <button class="type-btn active" data-type="text">Text</button>
      <button class="type-btn" data-type="audio">MP3</button>
    </div>
    <input type="text" id="practiceTitle" placeholder="Practice title"/>
    <textarea id="practiceContent" rows="4" placeholder="Practice instructions…" style="display:block"></textarea>
    <input type="file" id="practiceFile" accept="audio/*" style="display:none; color:rgba(255,255,255,0.6)"/>
    <div class="modal-btns">
      <button class="modal-cancel" id="cancelPractice">Cancel</button>
      <button class="modal-confirm" id="confirmPractice">Add</button>
    </div>
  </div>
</div>

<script>
  let currentClientId = null;
  let ws = null;
  let fogLevel = 12;
  let isListening = false;
  let mediaStream = null;
  let mediaRecorder = null;
  let pendingArcUpdate = null;

  // ── Load clients ──
  async function loadClients() {
    const showArchived = document.getElementById("showArchived")?.checked;
    const res = await fetch('/api/clients?archived=' + (showArchived ? 1 : 0));
    const clients = await res.json();
    const list = document.getElementById('clientList');
    list.innerHTML = '';
    clients.forEach(c => {
      const el = document.createElement('div');
      el.className = 'client-item' + (c.id === currentClientId ? ' active' : '');
      el.textContent = c.name;
      el.addEventListener('click', () => selectClient(c.id, c.name));
      list.appendChild(el);
    });
  }

  async function selectClient(id, name) {
    currentClientId = id;
    document.getElementById('noClientMsg').style.display = 'none';
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('clientNameDisplay').style.display = '';
    document.getElementById('clientNameDisplay').textContent = name;
    document.getElementById('sessionActions').style.display = 'flex';
    document.getElementById('leftCol').style.display = '';
    document.getElementById('rightCol').style.display = '';

    document.querySelectorAll('.client-item').forEach(el => el.classList.remove('active'));
    event?.target?.classList.add('active');

    // Load client data
    const res = await fetch(`/api/clients/${id}`);
    const data = await res.json();
    document.getElementById('arcText').value = data.arc || '';
    renderSessions(data.sessions || []);
    renderFacPractices(data.practices || []);

    // Open WebSocket
    openWs(id);
    loadClients();
  }

  function openWs(clientId) {
    if (ws) { ws.close(); ws = null; }
    const url = (location.protocol==='https:'?'wss':'ws')+'://'+location.host+
      `?type=facilitator&client=${clientId}`;
    ws = new WebSocket(url);

    ws.onmessage = async (e) => {
      const msg = JSON.parse(e.data);

      if (msg.type === 'briefing') {
        addMessage('bot', msg.text);
      }
      if (msg.type === 'response_text') {
        addMessage('bot', msg.text);
      }
      if (msg.type === 'audio') {
        if (document.getElementById('voiceOn')?.checked) {
          await playAudio(msg.data);
        }
        document.getElementById('waveSmall').classList.remove('on');
      }
      if (msg.type === 'explanation') {
        addExplanation(msg.text);
      }
      if (msg.type === 'session_summary') {
        addSummary(msg.summary, msg.arcUpdate);
        pendingArcUpdate = msg.arcUpdate;
        await loadClientData();
      }
      if (msg.type === 'arc_updated') {
        document.getElementById('arcText').value = pendingArcUpdate || document.getElementById('arcText').value;
        pendingArcUpdate = null;
        addMessage('bot', 'Arc updated.');
      }
      if (msg.type === 'listening_started') {
        document.getElementById('micBtnSmall').classList.add('active');
      }
      if (msg.type === 'listening_stopped') {
        document.getElementById('micBtnSmall').classList.remove('active');
      }
      if (msg.type === 'final_transcript') {
        addMessage('user', msg.text);
      }
    };
  }

  async function loadClientData() {
    if (!currentClientId) return;
    const res = await fetch(`/api/clients/${currentClientId}`);
    const data = await res.json();
    renderSessions(data.sessions || []);
    renderFacPractices(data.practices || []);
  }

  function renderSessions(sessions) {
    const list = document.getElementById('sessionsList');
    document.getElementById('sessionCount').textContent = sessions.length;
    if (!sessions.length) { list.innerHTML = '<div style="font-size:12px;color:rgba(255,255,255,0.25);font-style:italic">No sessions yet</div>'; return; }
    list.innerHTML = sessions.slice(0, 5).map(s => `
      <div class="session-item">
        <div class="session-date">${s.created_at?.slice(0,10) || ''}</div>
        <span class="session-type">${s.type}</span>
        <div class="session-summary">${s.summary?.slice(0,120)}${s.summary?.length>120?'…':''}</div>
      </div>
    `).join('');
  }

  function renderFacPractices(practices) {
    const list = document.getElementById('facPracticesList');
    if (!practices.length) { list.innerHTML = '<div style="font-size:12px;color:rgba(255,255,255,0.25);font-style:italic;padding:0 0 10px">No practices yet</div>'; return; }
    list.innerHTML = practices.map(p => `
      <div class="fac-practice-item">
        <span>${p.type==='audio'?'🎵':'📄'}</span>
        <div class="fac-practice-info">
          <div class="fac-practice-title">${p.title}</div>
          <div class="fac-practice-meta">Used ${p.use_count}× ${p.is_favourite?'· ❤️':''}</div>
        </div>
      </div>
    `).join('');
  }

  // ── Conversation ──
  function addMessage(role, text) {
    const conv = document.getElementById('conversation');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `<div class="msg-label">${role === 'bot' ? 'Per Bot' : 'You'}</div><div class="msg-bubble">${text}</div>`;
    conv.appendChild(div);
    conv.scrollTop = conv.scrollHeight;
  }

  function addExplanation(text) {
    const conv = document.getElementById('conversation');
    const div = document.createElement('div');
    div.className = 'explanation-bubble';
    div.innerHTML = `<strong style="font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(220,200,255,0.5);display:block;margin-bottom:8px">Explanation</strong>${text}`;
    conv.appendChild(div);
    conv.scrollTop = conv.scrollHeight;
  }

  function addSummary(summary, arcUpdate) {
    const conv = document.getElementById('conversation');
    const div = document.createElement('div');
    div.className = 'summary-bubble';
    div.innerHTML = `
      <h4>Session Summary</h4>
      <div>${summary}</div>
      ${arcUpdate ? `
        <div class="arc-update-box">
          <div style="font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(180,230,200,0.4);margin-bottom:8px">Suggested arc update</div>
          <div class="arc-update-text">${arcUpdate}</div>
          <button class="accept-arc-btn" onclick="acceptArcUpdate()">Accept & save arc</button>
        </div>
      ` : ''}
    `;
    conv.appendChild(div);
    conv.scrollTop = conv.scrollHeight;
  }

  function acceptArcUpdate() {
    if (!pendingArcUpdate || !ws) return;
    ws.send(JSON.stringify({ type: 'update_arc', arc: pendingArcUpdate }));
    document.getElementById('arcText').value = pendingArcUpdate;
  }
  window.acceptArcUpdate = acceptArcUpdate;

  // ── Audio ──
  function playAudio(b64) {
    return new Promise(res => {
      const bytes=atob(b64), arr=new Uint8Array(bytes.length);
      for(let i=0;i<bytes.length;i++) arr[i]=bytes.charCodeAt(i);
      const audio=new Audio(URL.createObjectURL(new Blob([arr],{type:'audio/mpeg'})));
      audio.onended=res; audio.onerror=res; audio.play().catch(res);
    });
  }

  // ── Send text ──
  async function sendText() {
    const input = document.getElementById('textInput');
    const text = input.value.trim();
    if (!text || !ws) return;
    input.value = '';
    addMessage('user', text);
    const detailed = document.getElementById('detailedOn')?.checked || false;
    ws.send(JSON.stringify({ type: 'text_input', text, detailed }));
  }

  document.getElementById('sendBtn').addEventListener('click', sendText);
  document.getElementById('textInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
  });

  // ── Mic ──
  const micBtn = document.getElementById('micBtnSmall');
  async function startListening() {
    if (isListening || !ws) return;
    try { mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
    catch { return; }
    isListening = true;
    ws.send(JSON.stringify({ type: 'start_listening' }));
    mediaRecorder = new MediaRecorder(mediaStream, { mimeType: 'audio/webm;codecs=opus' });
    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) {
        const r = new FileReader();
        r.onload = () => ws.send(JSON.stringify({ type: 'audio_chunk', data: r.result.split(',')[1] }));
        r.readAsDataURL(e.data);
      }
    };
    mediaRecorder.start(200);
    document.getElementById('waveSmall').classList.add('on');
  }
  function stopListening() {
    if (!isListening) return; isListening = false;
    mediaRecorder?.state !== 'inactive' && mediaRecorder.stop();
    mediaStream?.getTracks().forEach(t => t.stop()); mediaStream = null;
    ws?.send(JSON.stringify({ type: 'stop_listening' }));
    document.getElementById('waveSmall').classList.remove('on');
  }
  micBtn.addEventListener('mousedown', e => { e.preventDefault(); startListening(); });
  micBtn.addEventListener('mouseup', stopListening);
  micBtn.addEventListener('mouseleave', stopListening);
  micBtn.addEventListener('touchstart', e => { e.preventDefault(); startListening(); }, { passive: false });
  micBtn.addEventListener('touchend', e => { e.preventDefault(); stopListening(); });

  // ── Fog selector ──
  document.querySelectorAll('.fog-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      fogLevel = parseInt(btn.dataset.fog);
      document.querySelectorAll('.fog-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (ws) ws.send(JSON.stringify({ type: 'set_fog', level: fogLevel }));
    });
  });

  // ── Explain ──
  document.getElementById('explainBtn').addEventListener('click', () => {
    if (ws) ws.send(JSON.stringify({ type: 'explain' }));
  });

  // ── End session ──
  document.getElementById('endSessionBtn').addEventListener('click', () => {
    if (ws && currentClientId) {
      ws.send(JSON.stringify({ type: 'end_session' }));
      addMessage('bot', 'Generating session summary…');
    }
  });

  // ── Arc save ──
  document.getElementById('saveArcBtn').addEventListener('click', async () => {
    const arc = document.getElementById('arcText').value;
    await fetch(`/api/clients/${currentClientId}/arc`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ arc })
    });
    if (ws) ws.send(JSON.stringify({ type: 'update_arc', arc }));
  });

  // ── New client ──
  // Load categories into new client modal
  async function loadCatsForNewClient() {
    const res  = await fetch('/api/content/categories');
    const cats = await res.json();
    const tops = cats.filter(c => !c.parent_id);
    const el   = document.getElementById('newClientCat');
    el.innerHTML = '<option value="">Select programme…</option>';
    tops.forEach(c => { el.innerHTML += `<option value="${c.id}">${c.name}</option>`; });
    el._allCats = cats;
  }

  function loadNewClientSubs() {
    const catId  = document.getElementById('newClientCat').value;
    const cats   = document.getElementById('newClientCat')._allCats || [];
    const subEl  = document.getElementById('newClientSub');
    const subs   = cats.filter(c => c.parent_id === catId);
    subEl.innerHTML = '<option value="">Select track…</option>';
    subs.forEach(s => { subEl.innerHTML += `<option value="${s.id}">${s.name}</option>`; });
  }

  document.getElementById('newClientBtn').addEventListener('click', () => {
    document.getElementById('newClientModal').classList.add('visible');
    document.getElementById('newClientName').value  = '';
    document.getElementById('newClientEmail').value = '';
    document.getElementById('newClientCat').value   = '';
    document.getElementById('newClientSub').innerHTML = '<option value="">Select track…</option>';
    document.getElementById('newClientErr').textContent = '';
    document.getElementById('newClientName').focus();
    loadCatsForNewClient();
  });

  document.getElementById('cancelNewClient').addEventListener('click', () => {
    document.getElementById('newClientModal').classList.remove('visible');
  });

  document.getElementById('confirmNewClient').addEventListener('click', async () => {
    const name  = document.getElementById('newClientName').value.trim();
    const email = document.getElementById('newClientEmail').value.trim();
    const catId = document.getElementById('newClientCat').value;
    const subId = document.getElementById('newClientSub').value;
    const err   = document.getElementById('newClientErr');

    if (!name) { err.textContent = 'Name required.'; return; }

    const res  = await fetch('/api/clients', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email: email || null, categoryId: catId || null, subcategoryId: subId || null })
    });
    const client = await res.json();
    if (client.error) { err.textContent = client.error; return; }

    document.getElementById('newClientModal').classList.remove('visible');

    // Show confirmation
    const body = document.getElementById('clientCreatedBody');
    if (email && client.tempPassword) {
      body.innerHTML = `
        <div style="background:rgba(180,230,200,0.07);border:1px solid rgba(180,230,200,0.2);border-radius:10px;padding:16px;margin-bottom:10px">
          <div style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(180,230,200,0.45);margin-bottom:6px">Temporary password</div>
          <div style="font-size:20px;font-family:monospace;color:rgba(180,230,200,1);letter-spacing:0.06em">${client.tempPassword}</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.3);margin-top:8px">A welcome email has been sent to ${email}. Keep this as backup.</div>
        </div>`;
    } else {
      body.innerHTML = `<div style="font-size:14px;color:rgba(255,255,255,0.65)">${name} has been created. No email set — share the login URL manually when ready.</div>`;
    }
    document.getElementById('clientCreatedModal').classList.add('visible');
    await loadClients();
    selectClient(client.id, client.name);
  });

  document.getElementById('newClientName').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('newClientEmail').focus();
  });
  document.getElementById('newClientEmail').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('confirmNewClient').click();
  });

  // ── Add practice ──
  let practiceType = 'text';
  function openAddPractice() {
    document.getElementById('addPracticeModal').classList.add('visible');
    document.getElementById('practiceTitle').value = '';
    document.getElementById('practiceContent').value = '';
    document.getElementById('practiceFile').value = '';
  }
  document.getElementById('addPracticeBtn').addEventListener('click', openAddPractice);
  document.getElementById('addPracticeBtn2').addEventListener('click', openAddPractice);
  document.getElementById('cancelPractice').addEventListener('click', () => {
    document.getElementById('addPracticeModal').classList.remove('visible');
  });
  document.querySelectorAll('.type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      practiceType = btn.dataset.type;
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('practiceContent').style.display = practiceType === 'text' ? 'block' : 'none';
      document.getElementById('practiceFile').style.display = practiceType === 'audio' ? 'block' : 'none';
    });
  });
  document.getElementById('confirmPractice').addEventListener('click', async () => {
    const title = document.getElementById('practiceTitle').value.trim();
    if (!title || !currentClientId) return;

    if (practiceType === 'text') {
      const content = document.getElementById('practiceContent').value;
      await fetch('/api/practices/text', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ client_id: currentClientId, title, content })
      });
    } else {
      const file = document.getElementById('practiceFile').files[0];
      if (!file) return;
      const fd = new FormData();
      fd.append('client_id', currentClientId);
      fd.append('title', title);
      fd.append('file', file);
      await fetch('/api/practices/audio', { method: 'POST', body: fd });
    }

    document.getElementById('addPracticeModal').classList.remove('visible');
    loadClientData();
  });

  // ── Archive ──
  document.getElementById('archiveBtn').addEventListener('click', async () => {
    if (!currentClientId) return;
    await fetch('/api/clients/' + currentClientId + '/archive', { method: 'PATCH' });
    currentClientId = null;
    document.getElementById('leftCol').style.display = 'none';
    document.getElementById('rightCol').style.display = 'none';
    document.getElementById('clientNameDisplay').style.display = 'none';
    document.getElementById('sessionActions').style.display = 'none';
    document.getElementById('noClientMsg').style.display = '';
    document.getElementById('emptyState').style.display = '';
    loadClients();
  });

  document.getElementById('showArchived').addEventListener('change', loadClients);

  // ── Menu ──
  function toggleMenu() {
    const m = document.getElementById('facMenu');
    m.style.display = m.style.display === 'none' ? 'block' : 'none';
  }
  document.addEventListener('click', e => {
    const menu = document.getElementById('facMenu');
    if (menu && !e.target.closest('.sidebar-header')) menu.style.display = 'none';
  });

  // ── Logout ──
  async function logout() {
    await fetch('/api/logout', { method: 'POST' });
    window.location.href = '/login';
  }

  // ── Init ──
  loadClients();
</script>

<!-- Change Password Modal -->
<div id="changePwModal" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);align-items:center;justify-content:center">
  <div style="background:#141a17;border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:28px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:14px">
    <div style="font-size:16px;color:rgba(255,255,255,0.85)">Change password</div>
    <div>
      <div style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:6px">Current password</div>
      <input type="password" id="cpCurrent" style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:10px 13px;font-size:14px;color:rgba(255,255,255,0.82);font-family:Georgia,serif;outline:none"/>
    </div>
    <div>
      <div style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:6px">New password</div>
      <input type="password" id="cpNew" style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:10px 13px;font-size:14px;color:rgba(255,255,255,0.82);font-family:Georgia,serif;outline:none"/>
    </div>
    <div>
      <div style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:6px">Confirm new password</div>
      <input type="password" id="cpConfirm" style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:10px 13px;font-size:14px;color:rgba(255,255,255,0.82);font-family:Georgia,serif;outline:none"/>
    </div>
    <div id="cpErr" style="font-size:12px;color:rgba(255,120,100,0.8);min-height:16px"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button onclick="document.getElementById('changePwModal').style.display='none'" style="padding:8px 18px;border-radius:8px;border:1px solid rgba(255,255,255,0.12);background:none;color:rgba(255,255,255,0.45);cursor:pointer;font-family:Georgia,serif">Cancel</button>
      <button onclick="doChangePw()" style="padding:8px 18px;border-radius:8px;border:1px solid rgba(180,230,200,0.3);background:rgba(180,230,200,0.1);color:rgba(180,230,200,0.8);cursor:pointer;font-family:Georgia,serif">Save</button>
    </div>
  </div>
</div>

<script>
function openChangePw() {
  document.getElementById('cpCurrent').value='';
  document.getElementById('cpNew').value='';
  document.getElementById('cpConfirm').value='';
  document.getElementById('cpErr').textContent='';
  document.getElementById('changePwModal').style.display='flex';
}
async function doChangePw() {
  const current = document.getElementById('cpCurrent').value;
  const nw      = document.getElementById('cpNew').value;
  const confirm = document.getElementById('cpConfirm').value;
  const err     = document.getElementById('cpErr');
  if (!current || !nw) { err.textContent='All fields required.'; return; }
  if (nw.length < 8)   { err.textContent='New password must be at least 8 characters.'; return; }
  if (nw !== confirm)  { err.textContent='Passwords do not match.'; return; }
  const res  = await fetch('/api/change-password', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ currentPassword: current, password: nw })
  });
  const data = await res.json();
  if (data.error) { err.textContent = data.error; return; }
  document.getElementById('changePwModal').style.display='none';
}
</script>

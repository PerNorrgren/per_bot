<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mirror</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --teal: #2D7873; }
  html, body { height: 100%; background: #000; font-family: 'DM Sans', sans-serif; font-weight: 300; overflow: hidden; }
  #app { position: fixed; inset: 0; }
  #video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); opacity: 0; transition: opacity 1.4s; }
  #video.live { opacity: 1; }
  #vignette { position: fixed; inset: 0; background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.55) 100%); pointer-events: none; }
  #msgs { position: fixed; left: 0; right: 0; bottom: 130px; padding: 0 24px; display: flex; flex-direction: column; gap: 10px; max-height: 45vh; overflow-y: auto; }
  #msgs::-webkit-scrollbar { display: none; }
  .msg { animation: fu 0.4s ease; }
  @keyframes fu { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
  .bot-msg { display: inline-block; background: rgba(0,0,0,0.72); backdrop-filter: blur(6px); color: white; font-size: 18px; line-height: 1.7; padding: 12px 18px; border-radius: 12px; max-width: 85%; }
  .user-msg { color: rgba(255,255,255,0.4); font-size: 13px; padding: 2px 4px; }
  #controls { position: fixed; bottom: 0; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 40px; gap: 12px; }
  #mic-btn { width: 72px; height: 72px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; -webkit-tap-highlight-color: transparent; outline: none; }
  #mic-btn.listening { border-color: #e55; background: rgba(220,50,50,0.3); animation: mp 1.5s ease-in-out infinite; }
  #mic-btn.speaking { border-color: var(--teal); background: rgba(45,120,115,0.25); animation: mp 2s ease-in-out infinite; }
  #mic-btn.thinking { border-color: rgba(255,255,255,0.2); }
  @keyframes mp { 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }
  #status-text { font-size: 12px; color: rgba(255,255,255,0.4); letter-spacing: 0.08em; text-transform: uppercase; text-align: center; }
  #interim-text { position: fixed; bottom: 145px; left: 0; right: 0; text-align: center; font-size: 13px; color: rgba(255,255,255,0.3); font-style: italic; padding: 0 24px; pointer-events: none; }
  #mlabel { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); font-size: 10px; letter-spacing: 0.22em; color: rgba(255,255,255,0.15); font-style: italic; pointer-events: none; }
  #thinking { display: none; background: rgba(0,0,0,0.65); backdrop-filter: blur(6px); padding: 12px 18px; border-radius: 12px; }
  #thinking.on { display: inline-block; }
  .dw span { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3); margin: 0 3px; animation: dw 1.2s ease-in-out infinite; }
  .dw span:nth-child(2){animation-delay:0.15s;} .dw span:nth-child(3){animation-delay:0.3s;}
  @keyframes dw { 0%,80%,100%{transform:translateY(0);} 40%{transform:translateY(-6px);background:white;} }
  #start { position: fixed; inset: 0; background: #0e0e0f; display: flex; align-items: center; justify-content: center; z-index: 99; }
  #si { text-align: center; max-width: 340px; padding: 32px; }
  #si h1 { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 52px; font-weight: 400; color: #e8e6e1; margin-bottom: 6px; }
  #si .tag { font-size: 11px; color: #555552; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 40px; }
  #si .desc { font-size: 15px; line-height: 1.8; color: #888884; margin-bottom: 36px; }
  #gbtn { background: transparent; border: 1px solid var(--teal); color: var(--teal); padding: 14px 36px; border-radius: 6px; font-family: inherit; font-size: 13px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; }
  #pnote { font-size: 11px; color: #555552; margin-top: 18px; line-height: 1.6; }
  #ring { position: fixed; top: 50%; left: 50%; width: 110px; height: 110px; border-radius: 50%; border: 1px solid rgba(45,120,115,0.4); transform: translate(-50%,-50%); opacity: 0; transition: opacity 0.6s; pointer-events: none; }
  #ring.on { opacity: 1; animation: br 6s ease-in-out infinite; }
  @keyframes br { 0%,100%{transform:translate(-50%,-50%) scale(1);} 50%{transform:translate(-50%,-50%) scale(1.35);} }
  @media (max-width: 768px) { .bot-msg { font-size: 16px; max-width: 95%; } #msgs { bottom: 140px; padding: 0 16px; } }
</style>
</head>
<body>

<div id="start">
  <div id="si">
    <h1>Mirror</h1>
    <p class="tag">A space to be heard</p>
    <p class="desc">You bring something that's been sitting with you.<br>Speak. Mirror listens.<br>No agenda. No script.</p>
    <button id="gbtn" onclick="go()">Begin</button>
    <p id="pnote">Your camera and voice stay on your device.<br>Nothing is recorded or stored.</p>
  </div>
</div>

<div id="app">
  <video id="video" autoplay muted playsinline></video>
  <div id="vignette"></div>
  <div id="ring"></div>
  <div id="msgs">
    <div id="thinking" class="msg"><div class="dw"><span></span><span></span><span></span></div></div>
  </div>
  <div id="interim-text"></div>
  <div id="controls">
    <div id="status-text">starting...</div>
    <button id="mic-btn" onclick="toggleMic()">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="28" height="28">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
  </div>
  <div id="mlabel">mirror</div>
</div>

<script>
const SYS = `You are Mirror — a presence, not a programme. You accompany people through whatever they are carrying right now. You do not diagnose, advise, or fix. You ask the next right question and then you wait.

Your sole job is to help the person move from their head into their body, find what is actually present there, and stay with it long enough for something to shift.

IMPORTANT: Responses will be spoken aloud. Keep them short — 1 to 3 sentences maximum. No bullet points. No lists. No asterisks or markdown of any kind. Conversational and warm.

OPENING: Acknowledge the person is here. Invite them to feel their feet on the floor. Ask simply — what are you bringing today?
BODY ARRIVAL: Once they name what they are carrying, ask where it lands in the body. One question. Wait.
ACTIVATION: When they name a body location, stay with it. Ask what the feeling is like. Gently ask for a number zero to ten.
STAYING: Do not rush. Ask what the feeling says if it has words. Sometimes just a single line.
CORRECTIVE SEQUENCE: Both feet on the floor, press the heels down. One slow exhale, let it run all the way out. Hand on the chest, notice the weight and warmth. After each, ask what happens in the body.
WARMTH: Invite warmth toward the part carrying the difficulty. Not forgiveness. Just warmth.
CONSOLIDATION: When something shifts, name it simply. Ask what is different now.
CLOSING: One final exhale. Name what happened. Not as achievement. As fact.
TONE: Short. Warm. Precise. Never clinical.`;

let hist = [];
let busy = false;
let isListening = false;
let isSpeaking = false;
let currentAudio = null;
let mediaStream = null;
let audioContext = null;
let processor = null;
let deepgramWs = null;

const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
const WS_URL = `${wsProtocol}//${window.location.host}/listen`;

async function go() {
  document.getElementById('start').style.display = 'none';

  try {
    const s = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    const v = document.getElementById('video');
    v.srcObject = s;
    v.onloadedmetadata = () => v.classList.add('live');
  } catch(e) {}

  setTimeout(() => {
    const ring = document.getElementById('ring');
    ring.classList.add('on');
    setTimeout(() => ring.classList.remove('on'), 8000);
  }, 600);

  await ask(null);
}

function setStatus(txt) {
  document.getElementById('status-text').textContent = txt;
}

function addMsg(role, text) {
  const msgs = document.getElementById('msgs');
  const thinking = document.getElementById('thinking');
  const d = document.createElement('div');
  d.className = 'msg';
  const p = document.createElement('div');
  p.className = role === 'bot' ? 'bot-msg' : 'user-msg';
  p.textContent = text;
  d.appendChild(p);
  msgs.insertBefore(d, thinking);
  msgs.scrollTop = msgs.scrollHeight;
}

async function speak(text) {
  return new Promise(async (resolve) => {
    try {
      isSpeaking = true;
      document.getElementById('mic-btn').className = 'speaking';
      setStatus('mirror is speaking...');

      const r = await fetch('/api/speak', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });

      if (!r.ok) throw new Error('speak failed');

      const buffer = await r.arrayBuffer();
      const blob = new Blob([buffer], { type: 'audio/mpeg' });
      const url = URL.createObjectURL(blob);

      if (currentAudio) { currentAudio.pause(); currentAudio = null; }
      currentAudio = new Audio(url);

      currentAudio.onended = () => {
        URL.revokeObjectURL(url);
        isSpeaking = false;
        currentAudio = null;
        document.getElementById('mic-btn').className = '';
        setStatus('tap to speak');
        resolve();
      };

      currentAudio.onerror = () => {
        isSpeaking = false;
        document.getElementById('mic-btn').className = '';
        setStatus('tap to speak');
        resolve();
      };

      await currentAudio.play();

    } catch(e) {
      console.error('speak error:', e);
      isSpeaking = false;
      document.getElementById('mic-btn').className = '';
      setStatus('tap to speak');
      resolve();
    }
  });
}

async function toggleMic() {
  if (busy || isSpeaking) return;
  if (isListening) {
    stopListening();
  } else {
    await startListening();
  }
}

async function startListening() {
  try {
    // Get microphone access
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    audioContext = new AudioContext({ sampleRate: 16000 });
    const source = audioContext.createMediaStreamSource(mediaStream);

    // Connect to Deepgram via WebSocket
    deepgramWs = new WebSocket(WS_URL);

    // Auto-stop after 10 seconds
    const autoStop = setTimeout(() => {
      if (isListening && lastTranscript) {
        const t = lastTranscript;
        lastTranscript = '';
        stopListening();
        addMsg('user', t);
        ask(t);
      } else if (isListening) {
        stopListening();
      }
    }, 10000);

    deepgramWs.onopen = () => {
      isListening = true;
      document.getElementById('mic-btn').className = 'listening';
      setStatus('listening...');

      // Stream audio using ScriptProcessor
      processor = audioContext.createScriptProcessor(4096, 1, 1);
      source.connect(processor);
      processor.connect(audioContext.destination);

      processor.onaudioprocess = (e) => {
        if (deepgramWs.readyState !== WebSocket.OPEN) return;
        const inputData = e.inputBuffer.getChannelData(0);
        const pcm16 = new Int16Array(inputData.length);
        for (let i = 0; i < inputData.length; i++) {
          pcm16[i] = Math.max(-32768, Math.min(32767, inputData[i] * 32768));
        }
        deepgramWs.send(pcm16.buffer);
      };
    };

    let silenceTimer = null;
    let lastTranscript = '';

    deepgramWs.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        console.log('DG message:', JSON.stringify(data).slice(0, 200));
        const txt = data?.channel?.alternatives?.[0]?.transcript?.trim();
        if (!txt) return;
        document.getElementById('interim-text').textContent = txt;
        lastTranscript = txt;
        clearTimeout(silenceTimer);
        silenceTimer = setTimeout(() => {
          if (lastTranscript) {
            const t = lastTranscript;
            lastTranscript = '';
            document.getElementById('interim-text').textContent = '';
            stopListening();
            addMsg('user', t);
            ask(t);
          }
        }, 1200);
      } catch(e) { console.error('parse error:', e); }
    };

    deepgramWs.onerror = (e) => {
      console.error('WebSocket error:', e);
      stopListening();
    };

    deepgramWs.onclose = () => {
      if (isListening) stopListening();
    };

  } catch(e) {
    console.error('mic error:', e);
    setStatus('tap to speak');
  }
}

function stopListening() {
  isListening = false;
  if (processor) { processor.disconnect(); processor = null; }
  if (audioContext) { audioContext.close(); audioContext = null; }
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  if (deepgramWs && deepgramWs.readyState === WebSocket.OPEN) deepgramWs.close();
  deepgramWs = null;
  document.getElementById('mic-btn').className = '';
  document.getElementById('interim-text').textContent = '';
  setStatus('tap to speak');
}

async function ask(userMsg) {
  if (busy) return;
  busy = true;
  document.getElementById('mic-btn').className = 'thinking';
  setStatus('mirror is thinking...');
  document.getElementById('thinking').classList.add('on');

  const timer = setTimeout(() => { if (busy) setStatus('still here...'); }, 5000);

  if (userMsg) hist.push({ role: 'user', content: userMsg });
  const msgs = hist.length ? hist : [{ role: 'user', content: 'begin' }];

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 300, system: SYS, messages: msgs })
    });
    clearTimeout(timer);
    const data = await r.json();
    const txt = data.content?.[0]?.text || '';

    if (txt) {
      if (!hist.find(m => m.role === 'user')) hist.push({ role: 'user', content: 'begin' });
      hist.push({ role: 'assistant', content: txt });
      document.getElementById('thinking').classList.remove('on');
      addMsg('bot', txt);
      if (/heel|exhale|floor/i.test(txt)) {
        const ring = document.getElementById('ring');
        ring.classList.add('on');
        setTimeout(() => ring.classList.remove('on'), 14000);
      }
      busy = false;
      await speak(txt);
    } else {
      busy = false;
      document.getElementById('thinking').classList.remove('on');
      setStatus('tap to speak');
    }
  } catch(e) {
    clearTimeout(timer);
    busy = false;
    document.getElementById('thinking').classList.remove('on');
    console.error('ask error:', e);
    setStatus('tap to speak');
  }
}
</script>
</body>
</html>

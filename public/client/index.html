<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Deeper Mindfulness</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; font-family:'Georgia',serif; background:#0a0f0d; }

    .slideshow { position:fixed; inset:0; z-index:0; }
    .slide { position:absolute; inset:0; background-size:cover; background-position:center; opacity:0; transition:opacity 3s ease-in-out; }
    .slide.active { opacity:1; }
    .veil { position:fixed; inset:0; z-index:1; background:rgba(0,0,0,0.38); }
    .panel { position:fixed; inset:0; z-index:2; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }

    .glass {
      width:100%; max-width:500px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
      border:1px solid rgba(255,255,255,0.13);
      border-radius:22px; overflow:hidden;
      display:flex; flex-direction:column;
      max-height:90vh;
    }

    .header { padding:18px 24px 14px; border-bottom:1px solid rgba(255,255,255,0.07); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .wordmark { font-size:10px; letter-spacing:0.25em; text-transform:uppercase; color:rgba(255,255,255,0.4); }

    .tabs { display:flex; border-bottom:1px solid rgba(255,255,255,0.07); flex-shrink:0; }
    .tab { flex:1; padding:11px; text-align:center; font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:rgba(255,255,255,0.35); cursor:pointer; background:none; border:none; font-family:'Georgia',serif; transition:all 0.2s; }
    .tab.active { color:rgba(255,255,255,0.85); border-bottom:1.5px solid rgba(180,230,200,0.6); }

    /* Talk */
    .talk-view { padding:24px 24px 20px; display:flex; flex-direction:column; align-items:center; gap:20px; flex:1; }
    .transcript-area { width:100%; min-height:80px; display:flex; align-items:center; justify-content:center; text-align:center; }
    .transcript-text { font-size:16px; line-height:1.7; color:rgba(255,255,255,0.88); font-style:italic; transition:opacity 0.3s; }
    .transcript-text.dim  { opacity:0.4; }
    .transcript-text.user { font-style:normal; color:rgba(255,255,255,0.5); font-size:14px; }

    .indicators { height:22px; display:flex; align-items:center; justify-content:center; }
    .wave { display:none; gap:4px; align-items:flex-end; height:20px; }
    .wave.on { display:flex; }
    .wave span { display:block; width:3px; border-radius:2px; background:rgba(180,230,200,0.7); animation:wv 1.1s ease-in-out infinite; }
    .wave span:nth-child(1){height:8px;animation-delay:0s}
    .wave span:nth-child(2){height:14px;animation-delay:0.15s}
    .wave span:nth-child(3){height:20px;animation-delay:0.3s}
    .wave span:nth-child(4){height:14px;animation-delay:0.45s}
    .wave span:nth-child(5){height:8px;animation-delay:0.6s}
    @keyframes wv { 0%,100%{transform:scaleY(0.4);opacity:0.5} 50%{transform:scaleY(1);opacity:1} }
    .dots { display:none; gap:6px; align-items:center; }
    .dots.on { display:flex; }
    .dots span { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.35); animation:db 1.2s ease-in-out infinite; }
    .dots span:nth-child(1){animation-delay:0s}
    .dots span:nth-child(2){animation-delay:0.2s}
    .dots span:nth-child(3){animation-delay:0.4s}
    @keyframes db { 0%,80%,100%{transform:translateY(0);opacity:0.35} 40%{transform:translateY(-6px);opacity:1} }

    .mic-wrap { display:flex; flex-direction:column; align-items:center; gap:10px; }
    .mic-btn { width:68px; height:68px; border-radius:50%; border:1.5px solid rgba(255,255,255,0.22); background:rgba(255,255,255,0.06); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.25s ease; outline:none; }
    .mic-btn:hover { background:rgba(255,255,255,0.12); border-color:rgba(255,255,255,0.38); }
    .mic-btn.active { background:rgba(180,230,200,0.13); border-color:rgba(180,230,200,0.5); animation:pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(180,230,200,0.4)} 70%{box-shadow:0 0 0 16px rgba(180,230,200,0)} 100%{box-shadow:0 0 0 0 rgba(180,230,200,0)} }
    .mic-btn svg { width:26px; height:26px; fill:rgba(255,255,255,0.65); transition:fill 0.25s; }
    .mic-btn.active svg { fill:rgba(180,230,200,0.9); }
    .status { font-size:11px; letter-spacing:0.1em; color:rgba(255,255,255,0.25); text-transform:uppercase; height:14px; }
    .status.on { color:rgba(180,230,200,0.65); }

    /* Practices */
    .practices-view { display:none; flex-direction:column; overflow:hidden; }
    .practices-view.visible { display:flex; }
    .practices-scroll { overflow-y:auto; flex:1; padding:14px 18px; max-height:calc(var(--vh,1vh)*90 - 180px); min-height:0; }
    .practices-scroll::-webkit-scrollbar { width:3px; }
    .practices-scroll::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }
    .practice-item { display:flex; align-items:center; gap:12px; padding:11px 13px; margin-bottom:7px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:11px; cursor:pointer; transition:background 0.2s; }
    .practice-item:hover { background:rgba(255,255,255,0.09); }
    .practice-icon { font-size:18px; flex-shrink:0; }
    .practice-info { flex:1; min-width:0; }
    .practice-title { font-size:14px; color:rgba(255,255,255,0.82); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .practice-meta { font-size:11px; color:rgba(255,255,255,0.35); margin-top:2px; }
    .heart-btn { background:none; border:none; cursor:pointer; font-size:18px; opacity:0.35; transition:all 0.2s; flex-shrink:0; padding:4px; }
    .heart-btn.fav { opacity:1; }
    .heart-btn:hover { opacity:0.8; transform:scale(1.15); }
    .no-practices { text-align:center; padding:32px 20px; color:rgba(255,255,255,0.3); font-size:14px; font-style:italic; }

    /* Sessions */
    .sessions-view { display:none; flex-direction:column; overflow:hidden; }
    .sessions-view.visible { display:flex; }
    .sessions-scroll { overflow-y:auto; flex:1; padding:14px 18px; max-height:calc(var(--vh,1vh)*90 - 180px); min-height:0; }
    .session-item { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); border-radius:10px; padding:14px; margin-bottom:8px; }
    .session-date { font-size:11px; color:rgba(255,255,255,0.3); margin-bottom:6px; }
    .session-summary { font-size:13px; color:rgba(255,255,255,0.65); line-height:1.65; }
    .history-view { display:none; flex-direction:column; overflow:hidden; }
    .history-view.visible { display:flex; }
    .history-scroll { overflow-y:auto; flex:1; padding:14px 18px; max-height:calc(var(--vh,1vh)*90 - 180px); min-height:0; }
    .history-item { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); border-radius:10px; padding:14px; margin-bottom:8px; display:flex; align-items:center; gap:12px; }
    .history-icon { font-size:16px; opacity:0.6; flex-shrink:0; }
    .history-body { flex:1; min-width:0; }
    .history-title { font-size:13px; color:rgba(255,255,255,0.75); line-height:1.4; }
    .history-meta { font-size:11px; color:rgba(255,255,255,0.3); margin-top:3px; }
    .no-history { font-size:13px; color:rgba(255,255,255,0.35); padding:20px; text-align:center; }
    .no-sessions { text-align:center; padding:32px 20px; color:rgba(255,255,255,0.3); font-size:14px; font-style:italic; }

    /* Content tab */
    .content-view { display:none; flex-direction:column; overflow:hidden; }
    .content-view.visible { display:flex; }
    .content-scroll { overflow-y:auto; flex:1; padding:0 0 16px; max-height:calc(var(--vh,1vh)*90 - 180px); min-height:0; }
    .content-scroll::-webkit-scrollbar { width:3px; }
    .content-scroll::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }

    .content-section { margin-bottom:4px; }
    .content-section-hdr { font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:rgba(255,255,255,0.3); padding:12px 18px 6px; display:flex; align-items:center; justify-content:space-between; }
    .content-filters { display:flex; gap:6px; padding:10px 18px 4px; flex-wrap:wrap; }
    .content-filter-chip { font-size:11px; padding:5px 12px; border-radius:14px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.03); color:rgba(255,255,255,0.45); cursor:pointer; font-family:Georgia,serif; transition:all 0.15s; }
    .content-filter-chip.active { background:rgba(180,230,200,0.12); border-color:rgba(180,230,200,0.3); color:rgba(180,230,200,0.9); }
    .content-item { display:flex; align-items:center; gap:10px; padding:9px 18px; cursor:pointer; transition:background 0.15s; border-bottom:1px solid rgba(255,255,255,0.04); }
    .content-item:hover { background:rgba(255,255,255,0.04); }
    .content-item.locked { opacity:0.35; cursor:default; }
    .content-icon { font-size:16px; flex-shrink:0; width:20px; text-align:center; }
    .content-title { flex:1; font-size:13px; color:rgba(255,255,255,0.8); line-height:1.4; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .content-desc { font-size:11px; color:rgba(255,255,255,0.3); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .heart-btn { background:none; border:none; cursor:pointer; font-size:15px; padding:4px; color:rgba(255,255,255,0.2); transition:all 0.15s; flex-shrink:0; }
    .heart-btn.active { color:rgba(255,120,120,0.8); }
    .heart-btn:hover { transform:scale(1.2); }
    .play-btn { background:none; border:1px solid rgba(255,255,255,0.12); border-radius:50%; width:28px; height:28px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:all 0.15s; color:rgba(255,255,255,0.5); font-size:10px; }
    .play-btn:hover { background:rgba(180,230,200,0.1); border-color:rgba(180,230,200,0.3); color:rgba(180,230,200,0.8); }
    .play-btn.playing { background:rgba(180,230,200,0.12); border-color:rgba(180,230,200,0.4); color:rgba(180,230,200,0.9); }

    /* Mini player */
    .mini-player { display:none; padding:10px 16px; border-top:1px solid rgba(255,255,255,0.07); background:rgba(180,230,200,0.04); flex-shrink:0; }
    .mini-player.visible { display:block; }
    .mini-player-title { font-size:12px; color:rgba(255,255,255,0.6); margin-bottom:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .mini-player-controls { display:flex; align-items:center; gap:10px; }
    .mp-btn { background:none; border:1px solid rgba(255,255,255,0.15); border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:rgba(255,255,255,0.6); font-size:11px; flex-shrink:0; }
    .mp-btn:hover { border-color:rgba(180,230,200,0.4); color:rgba(180,230,200,0.8); }
    .mp-progress { flex:1; height:3px; background:rgba(255,255,255,0.1); border-radius:2px; cursor:pointer; position:relative; }
    .mp-progress-fill { height:100%; background:rgba(180,230,200,0.6); border-radius:2px; transition:width 0.5s linear; }
    .mp-time { font-size:10px; color:rgba(255,255,255,0.3); flex-shrink:0; }

    /* User playlists */
    .pl-create-btn { margin:8px 18px; padding:7px 14px; border-radius:8px; border:1px solid rgba(180,230,200,0.2); background:none; color:rgba(180,230,200,0.5); font-size:11px; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; font-family:'Georgia',serif; transition:all 0.2s; width:calc(100% - 36px); }
    .pl-create-btn:hover { background:rgba(180,230,200,0.07); color:rgba(180,230,200,0.8); }

    /* Voice / Config */
    .config-view { display:none; flex-direction:column; overflow:hidden; }
    .config-view.visible { display:flex; }
    .config-scroll { overflow-y:auto; flex:1; padding:20px 20px 24px; max-height:calc(var(--vh,1vh)*90 - 180px); min-height:0; }
    .config-label { font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-bottom:12px; display:block; }
    .voice-list { display:flex; flex-direction:column; gap:8px; }
    .voice-row { display:flex; align-items:center; gap:10px; padding:10px 13px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); border-radius:10px; cursor:pointer; transition:all 0.2s; }
    .voice-row:hover { background:rgba(255,255,255,0.08); }
    .voice-row.selected { background:rgba(180,230,200,0.08); border-color:rgba(180,230,200,0.3); }
    .voice-radio { width:14px; height:14px; border-radius:50%; border:1.5px solid rgba(255,255,255,0.25); flex-shrink:0; display:flex; align-items:center; justify-content:center; }
    .voice-row.selected .voice-radio { border-color:rgba(180,230,200,0.7); }
    .voice-radio-dot { width:6px; height:6px; border-radius:50%; background:rgba(180,230,200,0.9); display:none; }
    .voice-row.selected .voice-radio-dot { display:block; }
    .voice-info { flex:1; }
    .voice-name { font-size:13px; color:rgba(255,255,255,0.78); }
    .voice-desc { font-size:11px; color:rgba(255,255,255,0.32); margin-top:2px; }

    /* Playlist modals */
    .pl-modal-overlay { display:none; position:fixed; inset:0; z-index:300; background:rgba(0,0,0,0.65); backdrop-filter:blur(8px); align-items:center; justify-content:center; padding:20px; }
    .pl-modal-overlay.visible { display:flex; }
    .pl-modal { background:#141a17; border:1px solid rgba(255,255,255,0.12); border-radius:16px; padding:24px; width:100%; max-width:320px; display:flex; flex-direction:column; gap:14px; }
    .pl-modal h3 { font-size:15px; color:rgba(255,255,255,0.85); font-weight:normal; margin:0; }
    .pl-modal input { width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:8px; padding:10px 13px; font-size:14px; color:rgba(255,255,255,0.82); font-family:'Georgia',serif; outline:none; }
    .pl-modal-btns { display:flex; gap:10px; justify-content:flex-end; }
    .pl-modal-cancel { padding:8px 18px; border-radius:8px; border:1px solid rgba(255,255,255,0.12); background:none; color:rgba(255,255,255,0.45); cursor:pointer; font-family:'Georgia',serif; font-size:13px; }
    .pl-modal-ok { padding:8px 18px; border-radius:8px; border:1px solid rgba(180,230,200,0.3); background:rgba(180,230,200,0.1); color:rgba(180,230,200,0.8); cursor:pointer; font-family:'Georgia',serif; font-size:13px; }
    .pl-pick-list { display:flex; flex-direction:column; gap:6px; max-height:240px; overflow-y:auto; }
    .pl-pick-item { padding:10px 13px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:9px; font-size:13px; color:rgba(255,255,255,0.75); cursor:pointer; transition:background 0.15s; }
    .pl-pick-item:hover, .pl-pick-item:active { background:rgba(180,230,200,0.1); border-color:rgba(180,230,200,0.25); }
    .pl-delete-confirm { font-size:13px; color:rgba(255,255,255,0.6); line-height:1.6; }


    .player-overlay { display:none; position:absolute; inset:0; z-index:10; background:rgba(10,15,13,0.94); backdrop-filter:blur(12px); border-radius:22px; flex-direction:column; align-items:center; justify-content:center; gap:20px; padding:32px; }
    .player-overlay.visible { display:flex; }
    /* Video specifically breaks out of the 500px glass shell — a phone-app-card width is
       right for chat and lists, but wrong for video, which should use real screen space
       on desktop. .video-mode overrides position/sizing to cover the full viewport instead
       of being trapped inside the parent .glass panel. */
    .player-overlay.video-mode { position:fixed; inset:0; border-radius:0; z-index:500; padding:24px; }
    .player-overlay.video-mode .player-media { max-width:min(90vw, 1100px); }
    .player-overlay.video-mode .player-media video { max-height:80vh; }
    .player-title { font-size:17px; color:rgba(255,255,255,0.88); text-align:center; }
    .player-text { font-size:15px; line-height:1.8; color:rgba(255,255,255,0.7); text-align:center; font-style:italic; max-height:200px; overflow-y:auto; }
    .player-close { background:none; border:1px solid rgba(255,255,255,0.2); color:rgba(255,255,255,0.5); padding:8px 20px; border-radius:20px; cursor:pointer; font-size:12px; letter-spacing:0.1em; text-transform:uppercase; font-family:'Georgia',serif; }
    .player-btns { display:flex; gap:10px; }
    .player-media { width:100%; max-width:520px; }
    .player-media video { width:100%; max-height:50vh; border-radius:10px; background:#000; }
    .player-media iframe { width:100%; height:50vh; border:none; border-radius:10px; background:#fff; }
    .player-media .doc-link { display:inline-block; padding:10px 22px; border-radius:20px; background:rgba(180,230,200,0.12); border:1px solid rgba(180,230,200,0.3); color:rgba(180,230,200,0.9); text-decoration:none; font-size:13px; }

    /* Start screen — identical to Mare Bot */
    #start { position:fixed; inset:0; background:rgba(10,12,10,0.88); display:flex; align-items:center; justify-content:center; z-index:99; }
    #start-inner { text-align:center; max-width:320px; padding:32px; }
    #start-inner h1 { font-size:36px; color:rgba(255,255,255,0.85); margin-bottom:12px; font-weight:normal; font-style:italic; }
    #start-inner p { font-size:15px; line-height:1.8; color:rgba(255,255,255,0.45); margin-bottom:36px; }
    #start-btn { background:transparent; border:1px solid rgba(180,230,200,0.4); color:rgba(180,230,200,0.8); padding:14px 36px; border-radius:6px; font-family:inherit; font-size:13px; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; transition:all 0.2s; }
    #start-btn:hover { border-color:rgba(180,230,200,0.8); color:rgba(180,230,200,1); }

    /* Thinking indicator */
    .thinking { display:none; align-items:center; gap:8px; padding:10px 14px; background:rgba(180,230,200,0.06); border:1px solid rgba(180,230,200,0.12); border-radius:10px; margin-top:4px; }
    .thinking.visible { display:flex; }
    .thinking-text { font-size:12px; color:rgba(180,230,200,0.5); letter-spacing:0.08em; }
    .thinking-dots { display:flex; gap:4px; }
    .thinking-dots span { width:5px; height:5px; border-radius:50%; background:rgba(180,230,200,0.4); animation:db 1.2s ease-in-out infinite; }
    .thinking-dots span:nth-child(1){animation-delay:0s}
    .thinking-dots span:nth-child(2){animation-delay:0.2s}
    .thinking-dots span:nth-child(3){animation-delay:0.4s}

    /* Change password */
    .pw-overlay { display:none; position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.65); backdrop-filter:blur(8px); align-items:center; justify-content:center; padding:20px; }
    .pw-overlay.visible { display:flex; }
    .pw-modal { background:#141a17; border:1px solid rgba(255,255,255,0.12); border-radius:16px; padding:28px; width:100%; max-width:340px; display:flex; flex-direction:column; gap:14px; }
    .pw-modal h3 { font-size:16px; color:rgba(255,255,255,0.85); font-weight:normal; }
    .pw-field label { font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.35); display:block; margin-bottom:5px; }
    .pw-field input { width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:8px; padding:10px 13px; font-size:14px; color:rgba(255,255,255,0.82); font-family:'Georgia',serif; outline:none; }
    .pw-err { font-size:12px; color:rgba(255,120,100,0.8); min-height:16px; }
    .pw-btns { display:flex; gap:10px; justify-content:flex-end; }
    .pw-cancel { padding:8px 18px; border-radius:8px; border:1px solid rgba(255,255,255,0.12); background:none; color:rgba(255,255,255,0.45); cursor:pointer; font-family:'Georgia',serif; font-size:13px; }
    .pw-ok { padding:8px 18px; border-radius:8px; border:1px solid rgba(180,230,200,0.3); background:rgba(180,230,200,0.1); color:rgba(180,230,200,0.8); cursor:pointer; font-family:'Georgia',serif; font-size:13px; }
  </style>
</head>
<body>

<!-- Start screen — user must tap before any audio -->
<div id="start">
  <div id="start-inner">
    <h1>Deeper Mindfulness</h1>
    <p>Your guide is here.<br>Tap when you're ready.</p>
    <button id="start-btn" onclick="begin()">Begin</button>
  </div>
</div>

<div class="slideshow" id="slideshow"></div>
<div class="veil"></div>

<div class="panel">
  <div class="glass" style="position:relative">

    <div class="header">
      <div class="wordmark">Deeper Mindfulness</div>
      <div style="position:relative">
        <button onclick="toggleClientMenu()" style="display:flex;align-items:center;gap:5px;background:none;border:none;cursor:pointer;padding:3px 0">
          <span style="font-size:13px;color:rgba(255,255,255,0.5);font-family:Georgia,serif;letter-spacing:0.05em">My account</span>

        </button>
        <div id="clientMenu" style="display:none;position:absolute;top:100%;right:0;background:#1a2420;border:1px solid rgba(255,255,255,0.1);border-radius:0 0 10px 10px;z-index:50;min-width:160px;overflow:hidden">
          <a href="/account" style="display:block;width:100%;padding:11px 14px;background:none;border:none;border-bottom:1px solid rgba(255,255,255,0.06);color:rgba(180,230,200,0.65);font-size:13px;font-family:Georgia,serif;cursor:pointer;text-align:left;text-decoration:none">My account</a>
          <button onclick="openChangePw();toggleClientMenu()" style="width:100%;padding:11px 14px;background:none;border:none;border-bottom:1px solid rgba(255,255,255,0.06);color:rgba(255,255,255,0.6);font-size:13px;font-family:Georgia,serif;cursor:pointer;text-align:left">Change password</button>
          <button onclick="logout()" style="width:100%;padding:11px 14px;background:none;border:none;color:rgba(255,255,255,0.4);font-size:13px;font-family:Georgia,serif;cursor:pointer;text-align:left">Sign out</button>
        </div>

    </div>

    <div class="tabs">
      <button class="tab active" id="tabTalk"      onclick="switchTab('talk')">Talk</button>
      <button class="tab"        id="tabPractices" onclick="switchTab('practices')">Practices</button>
      <button class="tab"        id="tabSessions"  onclick="switchTab('sessions')">Sessions</button>
      <button class="tab"        id="tabHistory"   onclick="switchTab('history')">History</button>
      <button class="tab"        id="tabContent"   onclick="switchTab('content')">Content</button>
      <button class="tab"        id="tabConfig"    onclick="switchTab('config')">Voice</button>
    </div>

    <!-- Talk -->
    <div class="talk-view" id="talkView">
      <div class="transcript-area">
        <p class="transcript-text" id="transcript">—</p>
      </div>
      <div class="indicators">
        <div class="wave" id="wave"><span></span><span></span><span></span><span></span><span></span></div>
        <div class="dots" id="dots"><span></span><span></span><span></span></div>
      </div>
      <div class="mic-wrap">
        <button class="mic-btn" id="micBtn">
          <svg viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v7a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm0 2a2 2 0 0 0-2 2v7a2 2 0 0 0 4 0V5a2 2 0 0 0-2-2zm-7 9a1 1 0 0 1 1 1 6 6 0 0 0 12 0 1 1 0 0 1 2 0 8 8 0 0 1-7 7.938V23h3a1 1 0 0 1 0 2H8a1 1 0 0 1 0-2h3v-2.062A8 8 0 0 1 4 13a1 1 0 0 1 1-1z"/></svg>
        </button>

      <div class="status" id="status"></div>

        <button class="content-filter-chip active" data-filter="all" onclick="setContentFilter('all')">All</button>
        <button class="content-filter-chip" data-filter="audio" onclick="setContentFilter('audio')">🎵 Audio</button>
        <button class="content-filter-chip" data-filter="video" onclick="setContentFilter('video')">🎬 Video</button>

        <div class="mini-player-title" id="miniPlayerTitle">—</div>
        <div class="mini-player-controls">
          <button class="mp-btn" id="mpPlayBtn" onclick="mpToggle()">▶</button>
          <div class="mp-progress" id="mpProgress" onclick="mpSeek(event)" ontouchstart="mpSeek(event)">
            <div class="mp-progress-fill" id="mpFill" style="width:0%"></div>
          </div>
          <span class="mp-time" id="mpTime">0:00</span>
          <button class="mp-btn" onclick="mpClose()" style="font-size:14px">×</button>

      <div class="player-btns" id="playerBtns">
        <button class="player-close" id="fullscreenBtn" onclick="toggleFullscreen()" style="display:none">Full screen</button>
        <button class="player-close" onclick="closePlayerOverlay()">Close</button>

<!-- Change password -->
<div class="pw-overlay" id="pwOverlay">
  <div class="pw-modal">
    <h3>Change password</h3>
    <div class="pw-field"><label>Current password</label><input type="password" id="pwCurrent"/></div>
    <div class="pw-field"><label>New password</label><input type="password" id="pwNew"/></div>
    <div class="pw-field"><label>Confirm</label><input type="password" id="pwConfirm"/></div>
    <div class="pw-err" id="pwErr"></div>
    <div class="pw-btns">
      <button class="pw-cancel" onclick="document.getElementById('pwOverlay').classList.remove('visible')">Cancel</button>
      <button class="pw-ok" onclick="doChangePw()">Save</button>
    </div>
  </div>
</div>

<script>
  // ── Session ID ──
  const sessionId = Math.random().toString(36).slice(2);

  // ── iOS Safari vh fix ──
  function setVh() { document.documentElement.style.setProperty('--vh', window.innerHeight * 0.01 + 'px'); }
  setVh();
  window.addEventListener('resize', setVh);

  // ── Invitation notice ──
  const urlParams = new URLSearchParams(location.search);
  if (urlParams.get('notice') === 'invitation_accepted') {
    const t = document.getElementById('transcript');
    t.textContent = 'Welcome. Your invitation has been accepted.';
    t.className = 'transcript-text';
  }

  // ── Slideshow ──
  const slides = [
    'https://images.unsplash.com/photo-1505118380757-91f5f5632de0?w=1600&q=80',
    'https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=1600&q=80',
    'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=1600&q=80',
    'https://images.unsplash.com/photo-1448375240586-882707db888b?w=1600&q=80',
    'https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=1600&q=80',
    'https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?w=1600&q=80',
    'https://images.unsplash.com/photo-1465146344425-f00d5f5c8f07?w=1600&q=80',
  ];
  const ss = document.getElementById('slideshow');
  const slideEls = slides.map((url, i) => {
    const d = document.createElement('div');
    d.className = 'slide' + (i === 0 ? ' active' : '');
    d.style.backgroundImage = `url('${url}')`;
    ss.appendChild(d); return d;
  });
  let cur = 0;
  setInterval(() => {
    slideEls[cur].classList.remove('active');
    cur = (cur + 1) % slideEls.length;
    slideEls[cur].classList.add('active');
  }, 9000);

  // ── Tabs ──
  function switchTab(tab) {
    ['talk','practices','sessions','history','content','config'].forEach(t => {
      document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.toggle('active', t === tab);
    });
    document.getElementById('talkView').style.display      = tab === 'talk' ? '' : 'none';
    document.getElementById('practicesView').classList.toggle('visible', tab === 'practices');
    document.getElementById('sessionsView').classList.toggle('visible',  tab === 'sessions');
    document.getElementById('historyView').classList.toggle('visible',   tab === 'history');
    document.getElementById('contentView').classList.toggle('visible',   tab === 'content');
    document.getElementById('configView').classList.toggle('visible',    tab === 'config');
    if (tab === 'practices') loadPractices();
    if (tab === 'sessions')  loadSessions();
    if (tab === 'history')   loadHistory();
    if (tab === 'content')   loadContent();
  }

  // ── Auth ──
  async function logout() { await fetch('/api/logout',{method:'POST'}); location.href='/login'; }
  function toggleClientMenu() {
    const m = document.getElementById('clientMenu');
    m.style.display = m.style.display === 'none' ? 'block' : 'none';
  }
  document.addEventListener('click', e => {
    const m = document.getElementById('clientMenu');
    if (m && !e.target.closest('.header')) m.style.display = 'none';
  });
  function openChangePw() {
    ['pwCurrent','pwNew','pwConfirm'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('pwErr').textContent = '';
    document.getElementById('pwOverlay').classList.add('visible');
  }
  async function doChangePw() {
    const current = document.getElementById('pwCurrent').value;
    const nw      = document.getElementById('pwNew').value;
    const confirm = document.getElementById('pwConfirm').value;
    const err     = document.getElementById('pwErr');
    if (!current||!nw) { err.textContent='All fields required.'; return; }
    if (nw.length<8)   { err.textContent='At least 8 characters.'; return; }
    if (nw!==confirm)  { err.textContent='Passwords do not match.'; return; }
    const res  = await fetch('/api/change-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({currentPassword:current,password:nw})});
    const data = await res.json();
    if (data.error) { err.textContent=data.error; return; }
    document.getElementById('pwOverlay').classList.remove('visible');
  }

  // ── State ──
  const transcriptEl = document.getElementById('transcript');
  const statusEl     = document.getElementById('status');
  const micBtn       = document.getElementById('micBtn');
  const waveEl       = document.getElementById('wave');
  const dotsEl       = document.getElementById('dots');

  let isSpeaking = false;
  let busy       = false;
  let micActive  = false;
  let currentAudio = null;
  let mediaStream  = null;
  let audioContext = null;
  let processor    = null;
  let deepgramWs   = null;
  let accumulated  = '';

  function setStatus(t) { statusEl.textContent = t; }
  const thinkingEl = document.getElementById('thinking');

  function setState(s) {
    waveEl.classList.remove('on'); dotsEl.classList.remove('on');
    micBtn.classList.remove('active'); statusEl.classList.remove('on');
    thinkingEl.classList.remove('visible');
    if (s === 'idle')       { setStatus(''); }
    if (s === 'listening')  { micBtn.classList.add('active'); statusEl.classList.add('on'); setStatus('listening'); }
    if (s === 'processing') { thinkingEl.classList.add('visible'); setStatus(''); }
    if (s === 'speaking')   { waveEl.classList.add('on'); setStatus(''); }
  }

  // ── Speak — identical to Mare Bot ──
  async function speak(text) {
    return new Promise(async (resolve) => {
      try {
        isSpeaking = true;
        setState('speaking');
        accumulated = '';
        transcriptEl.className = 'transcript-text';

        const r = await fetch('/api/speak', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });

        if (!r.ok) throw new Error('speak failed');

        const buffer = await r.arrayBuffer();
        const blob   = new Blob([buffer], { type: 'audio/mpeg' });
        const url    = URL.createObjectURL(blob);

        if (currentAudio) { currentAudio.pause(); currentAudio = null; }
        currentAudio = new Audio(url);

        currentAudio.onended = () => {
          URL.revokeObjectURL(url);
          currentAudio = null;
          isSpeaking = false;
          setState('');
          setTimeout(() => {
            setStatus('listening');
            statusEl.classList.add('on');
            if (!micActive) startListening();
          }, 600);
          resolve();
        };

        currentAudio.onerror = () => {
          URL.revokeObjectURL(url);
          currentAudio = null;
          isSpeaking = false;
          resolve();
        };

        await currentAudio.play();

      } catch(e) {
        console.error('speak error', e);
        isSpeaking = false;
        resolve();
      }
    });
  }

  // ── Send to bot — identical to Mare Bot's sendToMare ──
  async function sendToBot(userMsg) {
    if (busy) return;
    busy = true;
    setState('processing');

    const message = (userMsg && userMsg !== '[START]') ? userMsg : 'begin';

    try {
      const r = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, sessionId })
      });

      const data = await r.json();
      const reply = data.reply || '';

      if (reply) {
        transcriptEl.textContent = reply;
        transcriptEl.className = 'transcript-text';
        busy = false;
        await speak(reply);
      } else {
        busy = false;
        setState('');
      }
    } catch(e) {
      console.error('chat error', e);
      busy = false;
      setState('');
    }
  }

  // ── STT — identical to Mare Bot ──
  async function startListening() {
    if (micActive) return;
    try {
      mediaStream  = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      audioContext = new AudioContext({ sampleRate: 16000 });
      const source = audioContext.createMediaStreamSource(mediaStream);

      const listenWsUrl = (location.protocol === 'https:' ? 'wss' : 'ws') + '://' + location.host + '/listen';
      deepgramWs = new WebSocket(listenWsUrl);

      deepgramWs.onopen = () => {
        micActive = true;
        setState('listening');

        processor = audioContext.createScriptProcessor(4096, 1, 1);
        source.connect(processor);
        processor.connect(audioContext.destination);

        processor.onaudioprocess = (e) => {
          if (isSpeaking || !deepgramWs || deepgramWs.readyState !== WebSocket.OPEN) return;
          const input = e.inputBuffer.getChannelData(0);
          const pcm16 = new Int16Array(input.length);
          for (let i = 0; i < input.length; i++) {
            pcm16[i] = Math.max(-32768, Math.min(32767, input[i] * 32768));
          }
          deepgramWs.send(pcm16.buffer);
        };
      };

      deepgramWs.onmessage = (event) => {
        if (isSpeaking || busy) return;
        try {
          const data = JSON.parse(event.data);
          const txt  = data?.channel?.alternatives?.[0]?.transcript?.trim();

          if (data.is_final && txt) {
            accumulated = (accumulated + ' ' + txt).trim();
            transcriptEl.textContent = accumulated;
            transcriptEl.className = 'transcript-text dim';
          } else if (!data.is_final && txt) {
            transcriptEl.textContent = (accumulated + ' ' + txt).trim();
            transcriptEl.className = 'transcript-text dim';
          }

          if (data.speech_final && accumulated) {
            const t = accumulated;
            accumulated = '';
            transcriptEl.textContent = t;
            transcriptEl.className = 'transcript-text user';
            sendToBot(t);
          }

          if (data.type === 'UtteranceEnd' && accumulated) {
            const t = accumulated;
            accumulated = '';
            transcriptEl.textContent = t;
            transcriptEl.className = 'transcript-text user';
            sendToBot(t);
          }
        } catch(e) {}
      };

      deepgramWs.onerror = () => { micActive = false; setTimeout(startListening, 2000); };
      deepgramWs.onclose = () => { micActive = false; if (!isSpeaking) setTimeout(startListening, 1000); };

    } catch(e) {
      setStatus('mic not available');
    }
  }

  // ── Begin — user gesture required (identical to Mare Bot) ──
  async function begin() {
    document.getElementById('start').style.display = 'none';
    setState('processing');
    await startListening();
    await sendToBot('[START]');
  }

  // ── Mic button — toggle ──
  micBtn.addEventListener('click', () => {
    if (micActive) {
      // Stop mic
      processor?.disconnect(); processor = null;
      audioContext?.close(); audioContext = null;
      mediaStream?.getTracks().forEach(t => t.stop()); mediaStream = null;
      deepgramWs?.close(); deepgramWs = null;
      micActive = false;
      setState('');
    } else {
      startListening();
    }
  });

  // ── Content ──
  // Classifies a file by what it actually is (audio/video/document), independent of
  // which category it was filed under. Replaces the old category-name matching, which
  // only ever showed files in the four originally-seeded categories — any custom
  // category (e.g. FELT·FIBRE, a programme-specific one) was invisible regardless of
  // tier or visibility, since nothing matched its section.
  function contentType(f) {
    if (isAudio(f)) return 'audio';
    if (f.file_type?.startsWith('video')) return 'video';
    return 'document';
  }

  let _contentFilter = 'all';
  function setContentFilter(filter) {
    _contentFilter = filter;
    document.querySelectorAll('.content-filter-chip').forEach(c => c.classList.toggle('active', c.dataset.filter === filter));
    renderContentScroll();
  }

  let _contentData   = [];
  let _userPlaylists = [];
  let _currentAudioFile = null;

  // Mini player state
  let mpAudio = null;

  // ── ID-based lookups, replacing embedded JSON in onclick attributes ──
  // Previously, mpPlay/openContentFile were called as onclick="mpPlay(${JSON.stringify(f)})",
  // which serializes the full file object — including its title, description, and signed
  // R2 URL — directly into an HTML attribute string. Any quote, apostrophe, or special
  // character in that data breaks the attribute boundary and the browser parses the
  // truncated remainder as a syntax-error script (this is what caused the "Unexpected
  // end of input" error — found via Sources tab, traced to the literal onclick attribute
  // itself, not the page's actual script). Passing only the ID and looking the file up
  // here is both safer and avoids re-serializing large objects into the DOM repeatedly.
  function mpPlayById(id) {
    const f = _contentData.find(x => x.id === id) || _userPlaylists.flatMap(p => p.items).find(x => x.id === id);
    if (f) mpPlay(f);
  }
  function openContentFileById(id) {
    const f = _contentData.find(x => x.id === id);
    if (f) openContentFile(f);
  }

  function fmtTime(s) {
    s = Math.floor(s||0);
    return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
  }

  async function mpPlay(file) {
    if (mpAudio) { mpAudio.pause(); mpAudio = null; }
    _currentAudioFile = file;
    document.getElementById('miniPlayerTitle').textContent = file.title;
    document.getElementById('miniPlayer').classList.add('visible');
    document.getElementById('mpFill').style.width = '0%';
    document.getElementById('mpTime').textContent = '0:00';
    document.getElementById('mpPlayBtn').textContent = '⏸';
    logHistory('audio', file.id);

    // Ask the server for a playback URL — checked against this person's tier first.
    // R2-stored files get a short-lived signed URL; legacy disk files get the same
    // /uploads/:filename path as before. Either way, the URL is resolved fresh here
    // rather than built from file.filename directly, so access control is never bypassed.
    let playUrl;
    try {
      const res  = await fetch(`/api/content/library/${file.id}/playback-url`);
      const data = await res.json();
      if (!res.ok || !data.url) {
        document.getElementById('mpPlayBtn').textContent = '▶';
        return;
      }
      playUrl = data.url;
    } catch {
      document.getElementById('mpPlayBtn').textContent = '▶';
      return;
    }

    mpAudio = new Audio(playUrl);
    mpAudio.addEventListener('timeupdate', () => {
      const pct = mpAudio.duration ? (mpAudio.currentTime / mpAudio.duration * 100) : 0;
      document.getElementById('mpFill').style.width = pct + '%';
      document.getElementById('mpTime').textContent = fmtTime(mpAudio.currentTime);
    });
    mpAudio.addEventListener('ended', () => {
      document.getElementById('mpPlayBtn').textContent = '▶';
      document.getElementById('mpFill').style.width = '0%';
      // Update play buttons
      document.querySelectorAll('.play-btn.playing').forEach(b => b.classList.remove('playing'));
      document.querySelectorAll('.play-btn').forEach(b => b.textContent = '▶');
    });
    mpAudio.play();
    // Mark play button
    document.querySelectorAll('.play-btn').forEach(b => {
      b.classList.toggle('playing', b.dataset.fileId === file.id);
      b.textContent = b.dataset.fileId === file.id ? '⏸' : '▶';
    });
  }

  function mpToggle() {
    if (!mpAudio) return;
    if (mpAudio.paused) { mpAudio.play(); document.getElementById('mpPlayBtn').textContent = '⏸'; }
    else { mpAudio.pause(); document.getElementById('mpPlayBtn').textContent = '▶'; }
  }

  function mpSeek(e) {
    if (!mpAudio || !mpAudio.duration) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    mpAudio.currentTime = ((clientX - rect.left) / rect.width) * mpAudio.duration;
  }

  function mpClose() {
    if (mpAudio) { mpAudio.pause(); mpAudio = null; }
    document.getElementById('miniPlayer').classList.remove('visible');
    document.querySelectorAll('.play-btn').forEach(b => { b.classList.remove('playing'); b.textContent = '▶'; });
    _currentAudioFile = null;
  }

  async function toggleFavourite(fileId, btn) {
    const isActive = btn.classList.contains('active');
    if (isActive) {
      await fetch(`/api/client/favourites/${fileId}`, { method: 'DELETE' });
    } else {
      await fetch(`/api/client/favourites/${fileId}`, { method: 'POST' });
    }
    // Update in data
    const f = _contentData.find(x => x.id === fileId);
    if (f) f.is_favourite = !isActive;
    // Full re-render — favourited items are now excluded from the main list (and vice
    // versa), so a partial update to just the favourites strip would leave the main
    // list showing a stale duplicate or a missing item until the next full reload.
    renderContentScroll();
  }

  function isAudio(f) {
    return f.file_type?.startsWith('audio') || f.filename?.match(/\.(mp3|wav|ogg|m4a|aac)$/i);
  }

  function logHistory(contentType, contentId) {
    fetch('/api/client/history', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contentType, contentId })
    }).catch(() => {}); // history logging is best-effort, never blocks playback
  }

  function contentItemHTML(f) {
    const icon  = isAudio(f) ? '🎵' : f.file_type?.startsWith('video') ? '🎬' : '📄';
    const heart = `<button class="heart-btn ${f.is_favourite?'active':''}" onclick="event.stopPropagation();toggleFavourite('${f.id}',this)" title="Favourite">♥</button>`;
    const play  = isAudio(f)
      ? `<button class="play-btn" data-file-id="${f.id}" onclick="event.stopPropagation();mpPlayById('${f.id}')" title="Play">▶</button>`
      : '';
    const addPl = `<button class="play-btn" style="font-size:9px" onclick="event.stopPropagation();openAddToPlaylist('${f.id}')" title="Add to playlist">＋</button>`;
    return `<div class="content-item" onclick="event.stopPropagation();openContentFileById('${f.id}')">
      <span class="content-icon">${icon}</span>
      <div style="flex:1;min-width:0">
        <div class="content-title">${f.title}</div>
        ${f.description?`<div class="content-desc">${f.description}</div>`:''}
      </div>
      ${play}${addPl}${heart}
    </div>`;
  }

  async function loadContent() {
    const el = document.getElementById('contentScroll');
    el.innerHTML = '<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.3);font-size:13px">Loading…</div>';

    try {
      const [filesRes, plRes] = await Promise.all([
        fetch('/api/client/content'),
        fetch('/api/client/playlists'),
      ]);
      _contentData   = await filesRes.json();
      _userPlaylists = await plRes.json();
      renderContentScroll();
    } catch(e) {
      el.innerHTML = '<div style="padding:20px;color:rgba(255,120,100,0.6);font-size:13px">Could not load content.</div>';
    }
  }

  function renderContentScroll() {
    const el   = document.getElementById('contentScroll');
    const favs = _contentData.filter(f => f.is_favourite);

    // Single list of everything else, filtered by the active type chip (or all),
    // sorted newest first. Favourites stay pinned above this regardless of filter,
    // so a favourited item is always reachable in one tap.
    const rest = _contentData
      .filter(f => !f.is_favourite)
      .filter(f => _contentFilter === 'all' || contentType(f) === _contentFilter)
      .sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''));

    let html = '';

    // Favourites
    html += `<div class="content-section">
      <div class="content-section-hdr">Favourites</div>
      <div id="content-favs">${
        favs.length
          ? favs.map(f => contentItemHTML(f)).join('')
          : '<div style="padding:8px 18px;font-size:12px;color:rgba(255,255,255,0.2);font-style:italic">Tap ♥ on any item to add it here.</div>'
      }</div>
    </div>`;

    // Everything else, as one list
    html += `<div class="content-section">
      <div id="content-all">${
        rest.length
          ? rest.map(f => contentItemHTML(f)).join('')
          : '<div style="padding:8px 18px;font-size:12px;color:rgba(255,255,255,0.2);font-style:italic">No content here yet.</div>'
      }</div>
    </div>`;

    // User playlists
    html += `<div class="content-section">
      <div class="content-section-hdr">My playlists</div>
      <button class="pl-create-btn" onclick="createUserPlaylist()">+ New playlist</button>
      <div id="user-playlists-list">${renderUserPlaylistsHTML()}</div>
    </div>`;

    el.innerHTML = html;
  }

  function renderUserPlaylistsHTML() {
    if (!_userPlaylists.length) return '<div style="padding:4px 18px 8px;font-size:12px;color:rgba(255,255,255,0.2);font-style:italic">No playlists yet.</div>';
    return _userPlaylists.map(pl => `
      <div style="margin:4px 18px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:10px;overflow:hidden">
        <div style="display:flex;align-items:center;padding:9px 13px;gap:8px">
          <span style="font-size:14px">🎵</span>
          <span style="flex:1;font-size:13px;color:rgba(255,255,255,0.75)">${pl.name}</span>
          <span style="font-size:11px;color:rgba(255,255,255,0.25)">${pl.items.length} track${pl.items.length!==1?'s':''}</span>
          <button onclick="deleteUserPlaylist('${pl.id}')" style="background:none;border:none;color:rgba(255,255,255,0.2);cursor:pointer;font-size:14px;padding:2px 4px">×</button>
        </div>
        ${pl.items.map(item => `
          <div class="content-item" style="padding:7px 13px 7px 36px">
            <span class="content-icon">🎵</span>
            <div class="content-title">${item.title}</div>
            <button class="play-btn" data-file-id="${item.id}" onclick="event.stopPropagation();mpPlayById('${item.id}')">▶</button>
            <button onclick="event.stopPropagation();removeFromPlaylist('${pl.id}','${item.id}')" style="background:none;border:none;color:rgba(255,255,255,0.2);cursor:pointer;font-size:13px;padding:2px 4px">×</button>
          </div>`).join('')}
      </div>`).join('');
  }

  // ── Playlist modals ──
  function closePlModal(id) {
    document.getElementById(id).classList.remove('visible');
  }

  async function createUserPlaylist() {
    const overlay = document.getElementById('plNameModal');
    const input   = document.getElementById('plNameInput');
    input.value   = '';
    document.getElementById('plNameModalTitle').textContent = 'New playlist';
    overlay.classList.add('visible');
    setTimeout(() => input.focus(), 100);
    document.getElementById('plNameOkBtn').onclick = async () => {
      const name = input.value.trim();
      if (!name) return;
      closePlModal('plNameModal');
      const res  = await fetch('/api/client/playlists', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name}) });
      const data = await res.json();
      if (data.id) { _userPlaylists.unshift({ id:data.id, name:data.name, items:[] }); updatePlaylistUI(); }
    };
    input.onkeydown = e => { if (e.key === 'Enter') document.getElementById('plNameOkBtn').click(); };
  }

  async function deleteUserPlaylist(id) {
    const pl  = _userPlaylists.find(p => p.id === id);
    if (!pl) return;
    const overlay = document.getElementById('plDeleteModal');
    document.getElementById('plDeleteMsg').textContent = `Delete "${pl.name}"? This cannot be undone.`;
    overlay.classList.add('visible');
    document.getElementById('plDeleteOkBtn').onclick = async () => {
      closePlModal('plDeleteModal');
      await fetch(`/api/client/playlists/${id}`, { method:'DELETE' });
      _userPlaylists = _userPlaylists.filter(p => p.id !== id);
      updatePlaylistUI();
    };
  }

  async function removeFromPlaylist(plId, fileId) {
    await fetch(`/api/client/playlists/${plId}/items/${fileId}`, { method:'DELETE' });
    const pl = _userPlaylists.find(p => p.id === plId);
    if (pl) pl.items = pl.items.filter(i => i.id !== fileId);
    updatePlaylistUI();
  }

  function openAddToPlaylist(fileId) {
    if (!_userPlaylists.length) {
      // No playlists — open create modal, then retry
      const overlay = document.getElementById('plNameModal');
      const input   = document.getElementById('plNameInput');
      input.value   = '';
      document.getElementById('plNameModalTitle').textContent = 'Create a playlist first';
      overlay.classList.add('visible');
      setTimeout(() => input.focus(), 100);
      document.getElementById('plNameOkBtn').onclick = async () => {
        const name = input.value.trim();
        if (!name) return;
        closePlModal('plNameModal');
        const res  = await fetch('/api/client/playlists', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name}) });
        const data = await res.json();
        if (data.id) {
          _userPlaylists.unshift({ id:data.id, name:data.name, items:[] });
          updatePlaylistUI();
          openAddToPlaylist(fileId);
        }
      };
      input.onkeydown = e => { if (e.key === 'Enter') document.getElementById('plNameOkBtn').click(); };
      return;
    }
    const overlay  = document.getElementById('plPickModal');
    const list     = document.getElementById('plPickList');
    list.innerHTML = _userPlaylists.map(pl => `
      <div class="pl-pick-item" onclick="addToPlaylistConfirm('${pl.id}','${fileId}')">${pl.name} <span style="color:rgba(255,255,255,0.3);font-size:11px">${pl.items.length} track${pl.items.length!==1?'s':''}</span></div>
    `).join('');
    overlay.classList.add('visible');
  }

  async function addToPlaylistConfirm(plId, fileId) {
    closePlModal('plPickModal');
    const pl = _userPlaylists.find(p => p.id === plId);
    if (!pl) return;
    const sortOrder = pl.items.length;
    await fetch(`/api/client/playlists/${pl.id}/items`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({fileId, sortOrder}) });
    const file = _contentData.find(f => f.id === fileId);
    if (file) { pl.items.push(file); updatePlaylistUI(); }
  }

  function updatePlaylistUI() {
    const el = document.getElementById('user-playlists-list');
    if (el) el.innerHTML = renderUserPlaylistsHTML();
  }


  async function openContentFile(f) {
    if (typeof f === 'string') f = JSON.parse(f);
    if (isAudio(f)) { mpPlay(f); return; }

    const type = f.file_type?.startsWith('video') ? 'video' : 'document';
    logHistory(type, f.id);

    document.getElementById('playerTitle').textContent = f.title;
    document.getElementById('playerText').textContent  = f.description || '';
    const mediaEl = document.getElementById('playerMedia');
    mediaEl.innerHTML = '<div style="font-size:12px;color:rgba(255,255,255,0.3)">Loading…</div>';
    const overlayEl = document.getElementById('playerOverlay');
    overlayEl.classList.toggle('video-mode', type === 'video');
    overlayEl.classList.add('visible');
    document.getElementById('fullscreenBtn').style.display = type === 'video' ? '' : 'none';

    // Ask the server for a playback URL — checked against this person's tier first,
    // same as audio. Works for both R2-stored and legacy disk files transparently.
    let url;
    try {
      const res  = await fetch(`/api/content/library/${f.id}/playback-url`);
      const data = await res.json();
      if (!res.ok || !data.url) {
        mediaEl.innerHTML = `<div style="font-size:13px;color:rgba(255,120,100,0.7)">${data.error || 'Could not open this file.'}</div>`;
        return;
      }
      url = data.url;
    } catch {
      mediaEl.innerHTML = '<div style="font-size:13px;color:rgba(255,120,100,0.7)">Could not open this file — network error.</div>';
      return;
    }

    if (type === 'video') {
      mediaEl.innerHTML = '';
      const video = document.createElement('video');
      video.src = url; video.controls = true; video.autoplay = true;
      mediaEl.appendChild(video);
    } else if (f.file_type === 'application/pdf') {
      mediaEl.innerHTML = `<iframe src="${url}"></iframe>`;
    } else {
      // Other document types (docx, pptx, etc.) — browsers generally can't render these
      // inline, so offer a direct open/download link rather than a blank frame.
      mediaEl.innerHTML = `<a class="doc-link" href="${url}" target="_blank" rel="noopener">Open document</a>`;
    }
  }

  function closePlayerOverlay() {
    const overlayEl = document.getElementById('playerOverlay');
    overlayEl.classList.remove('visible');
    overlayEl.classList.remove('video-mode');
    document.getElementById('fullscreenBtn').style.display = 'none';
    document.getElementById('fullscreenBtn').textContent = 'Full screen';
    if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
    const mediaEl = document.getElementById('playerMedia');
    // Stop any playing video when the overlay closes, rather than leaving it
    // playing silently in the background.
    const video = mediaEl.querySelector('video');
    if (video) { video.pause(); video.src = ''; }
    mediaEl.innerHTML = '';
  }

  // Uses the browser's native Fullscreen API — proper OS-level fullscreen (hides browser
  // chrome entirely, Escape key works to exit, behaves correctly across desktop/tablet/
  // phone) rather than a CSS trick that just makes a bigger box while the address bar
  // still shows. Requested on the overlay itself so the title/controls stay visible,
  // not just the bare <video> element.
  function toggleFullscreen() {
    const overlayEl = document.getElementById('playerOverlay');
    const btn = document.getElementById('fullscreenBtn');
    if (!document.fullscreenElement) {
      overlayEl.requestFullscreen?.().then(() => { btn.textContent = 'Exit full screen'; }).catch(() => {});
    } else {
      document.exitFullscreen?.().then(() => { btn.textContent = 'Full screen'; }).catch(() => {});
    }
  }

  // Keep the button label correct if fullscreen is exited via Escape key or browser UI,
  // not just via the button itself.
  document.addEventListener('fullscreenchange', () => {
    const btn = document.getElementById('fullscreenBtn');
    if (btn) btn.textContent = document.fullscreenElement ? 'Exit full screen' : 'Full screen';
  });

  // ── Practices ──
  async function loadPractices() {
    const res  = await fetch('/api/my/profile');
    const data = await res.json();
    renderPractices(data.practices || []);
  }
  function renderPractices(list) {
    const el = document.getElementById('practicesList');
    if (!list.length) { el.innerHTML='<div class="no-practices">No practices yet.</div>'; return; }
    const favs   = list.filter(p=>p.is_favourite);
    const others = list.filter(p=>!p.is_favourite);
    el.innerHTML = [...favs,...others].map(p=>`
      <div class="practice-item" onclick="openPractice('${p.id}','${p.title.replace(/'/g,"\\'")}','${p.type}','${(p.content||'').replace(/'/g,"\\'")}','${p.filename||''}')">
        <span class="practice-icon">${p.type==='audio'?'🎵':'📄'}</span>
        <div class="practice-info">
          <div class="practice-title">${p.title}</div>
          <div class="practice-meta">${p.type==='audio'?'Audio':'Text'} · Used ${p.use_count||0} times</div>
        </div>
        <button class="heart-btn ${p.is_favourite?'fav':''}" onclick="event.stopPropagation();toggleFav('${p.id}')">♥</button>
      </div>
    `).join('');
  }
  async function toggleFav(id) { await fetch(`/api/practices/${id}/favourite`,{method:'PATCH'}); loadPractices(); }
  function openPractice(id, title, type, content, filename) {
    document.getElementById('playerTitle').textContent = title;
    if (type==='text') {
      document.getElementById('playerText').textContent = content || '';
      document.getElementById('playerOverlay').classList.add('visible');
      fetch(`/api/practices/${id}/use`,{method:'PATCH'});
    } else {
      const audio = new Audio(`/uploads/${filename}`);
      document.getElementById('playerText').textContent = 'Playing…';
      document.getElementById('playerOverlay').classList.add('visible');
      audio.play();
      fetch(`/api/practices/${id}/use`,{method:'PATCH'});
      audio.onended = () => { document.getElementById('playerText').textContent='Done.'; };
    }
  }

  // ── Sessions ──
  async function loadSessions() {
    const res  = await fetch('/api/my/profile');
    const data = await res.json();
    renderSessions(data.sessions || []);
  }
  function renderSessions(list) {
    const el = document.getElementById('sessionsList');
    if (!list.length) { el.innerHTML='<div class="no-sessions">No sessions recorded yet.</div>'; return; }
    el.innerHTML = list.map(s=>`
      <div class="session-item">
        <div class="session-date">${s.created_at?.slice(0,10)||''}</div>
        <div class="session-summary">${s.client_summary||'Session recorded.'}</div>
      </div>
    `).join('');
  }

  async function loadHistory() {
    const res  = await fetch('/api/client/history');
    const list = await res.json();
    renderHistory(Array.isArray(list) ? list : []);
  }
  function historyIcon(item) {
    if (item.content_type === 'audio') return '🎵';
    if (item.content_type === 'video') return '🎬';
    return '📄';
  }
  function fmtHistoryDate(s) {
    if (!s) return '';
    const d = new Date(s.replace(' ', 'T') + 'Z');
    if (isNaN(d)) return s.slice(0,10);
    const now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    const time = d.toLocaleTimeString(undefined, { hour:'numeric', minute:'2-digit' });
    return sameDay ? `Today, ${time}` : d.toLocaleDateString(undefined, { day:'numeric', month:'short' }) + `, ${time}`;
  }
  function renderHistory(list) {
    const el = document.getElementById('historyList');
    if (!list.length) { el.innerHTML = '<div class="no-history">Nothing here yet — what you listen to, watch, or read will appear here.</div>'; return; }
    el.innerHTML = list.map(item => `
      <div class="history-item">
        <div class="history-icon">${historyIcon(item)}</div>
        <div class="history-body">
          <div class="history-title">${item.title || 'Untitled'}</div>
          <div class="history-meta">${fmtHistoryDate(item.played_at)}${item.category_name ? ' · ' + item.category_name : ''}</div>
        </div>
      </div>
    `).join('');
  }
</script>

    <div class="pl-modal-btns">

</div>

      <button class="pl-modal-cancel" onclick="closePlModal('plDeleteModal')">Cancel</button>

    </div>
  </div>
</div>

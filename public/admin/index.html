<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Deeper Mindfulness</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; font-family:'Georgia',serif; background:#0d1210; color:rgba(255,255,255,0.82); overflow:hidden; }
    .app { display:flex; height:100vh; flex-direction:column; }

    .topbar { padding:16px 24px; background:rgba(255,255,255,0.04); border-bottom:1px solid rgba(255,255,255,0.07); display:flex; align-items:center; justify-content:space-between; }
    .logo { font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:rgba(255,255,255,0.35); }
    .logo-name { font-size:16px; color:rgba(255,255,255,0.75); }
    .logout-btn { font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.3); background:none; border:1px solid rgba(255,255,255,0.1); padding:6px 14px; border-radius:6px; cursor:pointer; transition:all 0.2s; }
    .logout-btn:hover { color:rgba(255,255,255,0.6); border-color:rgba(255,255,255,0.25); }

    .content { flex:1; overflow-y:auto; padding:32px; display:flex; flex-direction:column; gap:32px; max-width:900px; margin:0 auto; width:100%; }

    .section-title { font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-bottom:16px; }

    .card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:14px; overflow:hidden; }
    .card-header { padding:16px 20px; border-bottom:1px solid rgba(255,255,255,0.06); display:flex; align-items:center; justify-content:space-between; }
    .card-title { font-size:14px; color:rgba(255,255,255,0.75); }
    .card-body { padding:0; }

    .row { display:flex; align-items:center; padding:12px 20px; border-bottom:1px solid rgba(255,255,255,0.04); gap:14px; }
    .row:last-child { border-bottom:none; }
    .row-name { flex:1; font-size:14px; color:rgba(255,255,255,0.78); }
    .row-meta { font-size:12px; color:rgba(255,255,255,0.3); }
    .row-role { font-size:10px; letter-spacing:0.08em; padding:3px 8px; border-radius:4px; background:rgba(180,230,200,0.1); color:rgba(180,230,200,0.7); }

    .btn { padding:6px 14px; border-radius:6px; border:1px solid rgba(255,255,255,0.12); background:none; color:rgba(255,255,255,0.5); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; transition:all 0.2s; font-family:'Georgia',serif; }
    .btn:hover { background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.8); }
    .btn.primary { border-color:rgba(180,230,200,0.3); color:rgba(180,230,200,0.75); }
    .btn.primary:hover { background:rgba(180,230,200,0.1); }
    .btn.danger { border-color:rgba(255,120,100,0.3); color:rgba(255,120,100,0.7); }
    .btn.danger:hover { background:rgba(255,120,100,0.08); }

    .empty { padding:24px 20px; font-size:13px; color:rgba(255,255,255,0.25); font-style:italic; }

    /* Modal */
    .modal-overlay { display:none; position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.6); backdrop-filter:blur(8px); align-items:center; justify-content:center; }
    .modal-overlay.visible { display:flex; }
    .modal { background:#141a17; border:1px solid rgba(255,255,255,0.12); border-radius:16px; padding:28px; width:100%; max-width:380px; display:flex; flex-direction:column; gap:16px; }
    .modal h3 { font-size:15px; color:rgba(255,255,255,0.85); font-weight:normal; }
    .modal input { width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:8px; padding:10px 14px; font-size:14px; color:rgba(255,255,255,0.82); font-family:'Georgia',serif; outline:none; }
    .modal input:focus { border-color:rgba(180,230,200,0.3); }
    .modal-note { font-size:12px; color:rgba(255,255,255,0.3); line-height:1.6; }
    .modal-btns { display:flex; gap:10px; justify-content:flex-end; margin-top:4px; }
    .modal-cancel { padding:8px 18px; border-radius:8px; border:1px solid rgba(255,255,255,0.12); background:none; color:rgba(255,255,255,0.45); cursor:pointer; font-size:13px; font-family:'Georgia',serif; }
    .modal-confirm { padding:8px 18px; border-radius:8px; border:1px solid rgba(180,230,200,0.3); background:rgba(180,230,200,0.1); color:rgba(180,230,200,0.8); cursor:pointer; font-size:13px; font-family:'Georgia',serif; }
    .modal-error { font-size:12px; color:rgba(255,120,100,0.8); min-height:16px; }

    .temp-password { background:rgba(180,230,200,0.08); border:1px solid rgba(180,230,200,0.2); border-radius:8px; padding:14px; font-size:13px; color:rgba(180,230,200,0.8); line-height:1.7; }
    .temp-password strong { display:block; font-size:16px; letter-spacing:0.05em; margin-top:6px; color:rgba(180,230,200,1); }
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div>
      <div class="logo">Deeper Mindfulness</div>
      <div class="logo-name">Admin</div>
    </div>
    <a href="/admin/content" class="logout-btn" style="text-decoration:none;margin-right:8px">Content library</a>
    <button class="logout-btn" onclick="logout()">Sign out</button>
  </div>

  <div class="content">
    <!-- Facilitators -->
    <div>
      <div class="section-title">Facilitators</div>
      <div class="card">
        <div class="card-header">
          <div class="card-title">All facilitators</div>
          <button class="btn primary" onclick="openNewFacilitator()">+ Add facilitator</button>
        </div>
        <div class="card-body" id="facilitatorList">
          <div class="empty">Loading…</div>
        </div>
      </div>
    </div>

    <!-- All clients -->
    <div>
      <div class="section-title">All clients</div>
      <div class="card">
        <div class="card-header">
          <div class="card-title">All clients across facilitators</div>
          <label style="font-size:12px;color:rgba(255,255,255,0.3);cursor:pointer">
            <input type="checkbox" id="showArchived" style="margin-right:6px;accent-color:#b4e6c8">
            Show archived
          </label>
        </div>
        <div class="card-body" id="clientList">
          <div class="empty">Loading…</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- New facilitator modal -->
<div class="modal-overlay" id="newFacModal">
  <div class="modal">
    <h3>Add facilitator</h3>
    <input type="text" id="facName" placeholder="Full name"/>
    <input type="email" id="facEmail" placeholder="Email address"/>
    <div class="modal-error" id="facError"></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('newFacModal')">Cancel</button>
      <button class="modal-confirm" onclick="createFacilitator()">Create</button>
    </div>
  </div>
</div>

<!-- Temp password display modal -->
<div class="modal-overlay" id="tempPassModal">
  <div class="modal">
    <h3>Facilitator created</h3>
    <div class="temp-password" id="tempPassDisplay"></div>
    <div class="modal-note">Share this temporary password securely. They will be asked to change it on first login.</div>
    <div class="modal-btns">
      <button class="modal-confirm" onclick="closeModal('tempPassModal')">Done</button>
    </div>
  </div>
</div>

<script>
  async function logout() {
    await fetch('/api/logout', { method: 'POST' });
    window.location.href = '/login';
  }

  function openNewFacilitator() {
    document.getElementById('facName').value = '';
    document.getElementById('facEmail').value = '';
    document.getElementById('facError').textContent = '';
    document.getElementById('newFacModal').classList.add('visible');
    document.getElementById('facName').focus();
  }

  function closeModal(id) {
    document.getElementById(id).classList.remove('visible');
  }

  async function createFacilitator() {
    const name  = document.getElementById('facName').value.trim();
    const email = document.getElementById('facEmail').value.trim();
    const err   = document.getElementById('facError');
    if (!name || !email) { err.textContent = 'Name and email required.'; return; }

    const res  = await fetch('/api/admin/facilitators', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email })
    });
    const data = await res.json();

    if (data.error) { err.textContent = data.error; return; }

    closeModal('newFacModal');
    document.getElementById('tempPassDisplay').innerHTML =
      `<span>${name} has been created.</span><br>Temporary password:<strong>${data.tempPassword}</strong>`;
    document.getElementById('tempPassModal').classList.add('visible');
    loadData();
  }

  async function deleteFacilitator(id, name) {
    if (!confirm(`Remove ${name}? Their clients will remain but be unassigned.`)) return;
    await fetch(`/api/admin/facilitators/${id}`, { method: 'DELETE' });
    loadData();
  }

  async function loadData() {
    const [facRes, clientRes] = await Promise.all([
      fetch('/api/admin/facilitators'),
      fetch('/api/admin/clients?archived=' + (document.getElementById('showArchived').checked ? 1 : 0))
    ]);
    const facilitators = await facRes.json();
    const clients      = await clientRes.json();

    // Render facilitators
    const facEl = document.getElementById('facilitatorList');
    if (!facilitators.length) {
      facEl.innerHTML = '<div class="empty">No facilitators yet.</div>';
    } else {
      facEl.innerHTML = facilitators.map(f => `
        <div class="row">
          <div class="row-name">${f.name}</div>
          <div class="row-meta">${f.email}</div>
          <button class="btn danger" onclick="deleteFacilitator('${f.id}', '${f.name}')">Remove</button>
        </div>
      `).join('');
    }

    // Render clients
    const clientEl = document.getElementById('clientList');
    if (!clients.length) {
      clientEl.innerHTML = '<div class="empty">No clients yet.</div>';
    } else {
      clientEl.innerHTML = clients.map(c => `
        <div class="row">
          <div class="row-name">${c.name} ${c.archived ? '<span style="font-size:11px;color:rgba(255,255,255,0.25)">(archived)</span>' : ''}</div>
          <div class="row-meta">${c.facilitator_name || 'Unassigned'}</div>
          <div class="row-meta">${c.email || 'No login'}</div>
        </div>
      `).join('');
    }
  }

  document.getElementById('showArchived').addEventListener('change', loadData);
  loadData();
</script>
</body>
</html>

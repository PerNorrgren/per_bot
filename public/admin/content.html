<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Content — Deeper Mindfulness</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; font-family:'Georgia',serif; background:#0d1210; color:rgba(255,255,255,0.82); overflow:hidden; }
    .app { display:flex; height:100vh; flex-direction:column; }
    .topbar { padding:14px 24px; background:rgba(255,255,255,0.04); border-bottom:1px solid rgba(255,255,255,0.07); display:flex; align-items:center; gap:16px; flex-shrink:0; }
    .logo { font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:rgba(255,255,255,0.35); }
    .logo-name { font-size:16px; color:rgba(255,255,255,0.75); }
    .nav-tabs { display:flex; gap:4px; margin-left:24px; }
    .nav-tab { padding:7px 16px; border-radius:6px; border:none; background:none; color:rgba(255,255,255,0.4); font-size:12px; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; transition:all 0.2s; font-family:'Georgia',serif; }
    .nav-tab.active { background:rgba(255,255,255,0.09); color:rgba(255,255,255,0.85); }
    .topbar-right { margin-left:auto; display:flex; gap:8px; align-items:center; }
    .btn { padding:7px 14px; border-radius:7px; border:1px solid rgba(255,255,255,0.12); background:none; color:rgba(255,255,255,0.5); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; transition:all 0.2s; font-family:'Georgia',serif; text-decoration:none; display:inline-flex; align-items:center; }
    .btn:hover { background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.8); }
    .btn.primary { border-color:rgba(180,230,200,0.35); color:rgba(180,230,200,0.75); }
    .btn.primary:hover { background:rgba(180,230,200,0.1); }
    .btn.danger { border-color:rgba(255,100,80,0.25); color:rgba(255,100,80,0.6); }
    .btn.danger:hover { background:rgba(255,100,80,0.08); }
    .btn.sm { padding:5px 10px; font-size:10px; }
    .content { flex:1; overflow:hidden; }
    .main { height:100%; overflow-y:auto; padding:24px 28px; }
    .main::-webkit-scrollbar { width:4px; }
    .main::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }
    .panel { display:none; }
    .panel.active { display:block; }
    .toolbar { display:flex; align-items:center; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
    .toolbar-title { font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:rgba(255,255,255,0.3); flex:1; }
    select.filter { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:7px; padding:7px 12px; font-size:12px; color:rgba(255,255,255,0.65); font-family:'Georgia',serif; outline:none; }
    select.filter option { background:#1a2420; }
    input.search { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:7px; padding:7px 12px; font-size:12px; color:rgba(255,255,255,0.75); font-family:'Georgia',serif; outline:none; width:200px; }
    input.search::placeholder { color:rgba(255,255,255,0.2); }
    .file-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; }
    .file-card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:11px; overflow:hidden; transition:border-color 0.2s; }
    .file-card:hover { border-color:rgba(255,255,255,0.16); }
    .file-card-body { padding:14px; }
    .file-card-icon { font-size:22px; margin-bottom:8px; }
    .file-card-title { font-size:13px; color:rgba(255,255,255,0.82); margin-bottom:4px; line-height:1.4; }
    .file-card-meta { font-size:11px; color:rgba(255,255,255,0.3); line-height:1.5; }
    .file-card-tags { display:flex; gap:5px; margin-top:8px; flex-wrap:wrap; }
    .tag { font-size:10px; padding:2px 7px; border-radius:4px; letter-spacing:0.04em; }
    .tag.cat { background:rgba(180,230,200,0.1); color:rgba(180,230,200,0.65); }
    .tag.uses { background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.35); }
    .file-card-footer { padding:8px 14px; border-top:1px solid rgba(255,255,255,0.05); display:flex; gap:6px; flex-wrap:wrap; }
    .item-list { display:flex; flex-direction:column; gap:10px; }
    .item-row { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:11px; padding:16px 18px; display:flex; align-items:center; gap:14px; }
    .item-row-info { flex:1; }
    .item-row-title { font-size:14px; color:rgba(255,255,255,0.82); }
    .item-row-meta { font-size:12px; color:rgba(255,255,255,0.3); margin-top:4px; }
    .item-row-tags { display:flex; gap:5px; margin-top:6px; }
    .item-row-actions { display:flex; gap:6px; flex-shrink:0; }
    .cat-tree { display:flex; flex-direction:column; gap:8px; }
    .cat-top { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:10px; overflow:hidden; }
    .cat-top-row { padding:12px 16px; display:flex; align-items:center; gap:10px; }
    .cat-top-name { font-size:14px; color:rgba(255,255,255,0.78); flex:1; }
    .cat-sub-row { padding:9px 16px 9px 32px; display:flex; align-items:center; gap:10px; border-top:1px solid rgba(255,255,255,0.04); }
    .cat-sub-name { font-size:13px; color:rgba(255,255,255,0.5); flex:1; }
    .drop-zone { border:2px dashed rgba(255,255,255,0.12); border-radius:12px; padding:36px; text-align:center; cursor:pointer; transition:all 0.25s; margin-bottom:16px; }
    .drop-zone:hover, .drop-zone.dragover { border-color:rgba(180,230,200,0.4); background:rgba(180,230,200,0.04); }
    .upload-queue { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; max-height:240px; overflow-y:auto; }
    .upload-item { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); border-radius:8px; padding:9px 12px; display:flex; align-items:center; gap:10px; }
    .upload-item-name { flex:1; font-size:12px; color:rgba(255,255,255,0.65); }
    .vis-sel { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:6px; padding:4px 8px; font-size:11px; color:rgba(255,255,255,0.55); font-family:'Georgia',serif; outline:none; }
    .vis-sel option { background:#1a2420; }
    .vis-badge { display:inline-block; font-size:10px; padding:2px 7px; border-radius:4px; }
    .vis-registered { background:rgba(255,200,100,0.12); color:rgba(255,200,100,0.7); }
    .vis-member     { background:rgba(180,230,200,0.1);  color:rgba(180,230,200,0.6); }
    .vis-client      { background:rgba(200,150,255,0.12); color:rgba(200,150,255,0.7); }
    .vis-facilitator { background:rgba(255,150,100,0.12); color:rgba(255,150,100,0.7); }
    .vis-admin       { background:rgba(255,100,100,0.12); color:rgba(255,100,100,0.7); }
    .vis-client { background:rgba(100,180,255,0.12); color:rgba(100,180,255,0.7); }
    .vis-facilitator { background:rgba(200,150,255,0.12); color:rgba(200,150,255,0.7); }
    .vis-admin { background:rgba(255,120,80,0.12); color:rgba(255,120,80,0.7); }
    .empty { padding:48px; text-align:center; color:rgba(255,255,255,0.2); font-style:italic; }
    .modal-overlay { display:none; position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.72); backdrop-filter:blur(8px); align-items:flex-start; justify-content:center; padding:32px 20px; overflow-y:auto; }
    .modal-overlay.open { display:flex; }
    .modal { background:#131a17; border:1px solid rgba(255,255,255,0.12); border-radius:16px; padding:28px; width:100%; max-width:580px; margin:auto; display:flex; flex-direction:column; gap:14px; }
    .modal h3 { font-size:16px; color:rgba(255,255,255,0.85); font-weight:normal; }
    .modal label { font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.35); display:block; margin-bottom:5px; }
    .modal input[type=text],.modal input[type=number],.modal textarea,.modal select { width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:8px; padding:10px 13px; font-size:14px; color:rgba(255,255,255,0.82); font-family:'Georgia',serif; outline:none; }
    .modal select option { background:#1a2420; }
    .modal textarea { resize:vertical; min-height:60px; }
    .modal input:focus,.modal textarea:focus,.modal select:focus { border-color:rgba(180,230,200,0.3); }
    .modal-row { display:flex; gap:12px; }
    .modal-row > div { flex:1; }
    .modal-err { font-size:12px; color:rgba(255,120,100,0.8); min-height:16px; }
    .modal-btns { display:flex; gap:10px; justify-content:flex-end; margin-top:4px; }
    .modal-cancel { padding:8px 18px; border-radius:8px; border:1px solid rgba(255,255,255,0.12); background:none; color:rgba(255,255,255,0.45); cursor:pointer; font-family:'Georgia',serif; font-size:13px; }
    .modal-ok { padding:8px 18px; border-radius:8px; border:1px solid rgba(180,230,200,0.3); background:rgba(180,230,200,0.1); color:rgba(180,230,200,0.8); cursor:pointer; font-family:'Georgia',serif; font-size:13px; }
    .file-picker { border:1px solid rgba(255,255,255,0.08); border-radius:10px; overflow:hidden; }
    .file-picker-search { width:100%; background:rgba(255,255,255,0.06); border:none; border-bottom:1px solid rgba(255,255,255,0.06); padding:9px 13px; font-size:12px; color:rgba(255,255,255,0.75); font-family:'Georgia',serif; outline:none; }
    .file-picker-list { max-height:260px; overflow-y:auto; }
    .file-picker-list::-webkit-scrollbar { width:3px; }
    .picker-item { padding:9px 13px; display:flex; align-items:center; gap:10px; border-bottom:1px solid rgba(255,255,255,0.04); cursor:pointer; transition:background 0.15s; }
    .picker-item:hover { background:rgba(255,255,255,0.05); }
    .picker-item.sel { background:rgba(180,230,200,0.07); }
    .picker-item-info { flex:1; min-width:0; }
    .picker-item-title { font-size:13px; color:rgba(255,255,255,0.75); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .picker-item-meta { font-size:11px; color:rgba(255,255,255,0.3); }
    .lesson-builder { border:1px solid rgba(255,255,255,0.08); border-radius:10px; overflow:hidden; }
    .lesson-builder-hdr { padding:10px 14px; background:rgba(255,255,255,0.03); border-bottom:1px solid rgba(255,255,255,0.06); font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.3); }
    .lesson-entry { padding:10px 14px; border-bottom:1px solid rgba(255,255,255,0.05); display:flex; gap:10px; align-items:center; }
    .lesson-entry-num { font-size:13px; color:rgba(255,255,255,0.25); min-width:22px; }
    .lesson-entry input { flex:1; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:7px; padding:8px 12px; font-size:13px; color:rgba(255,255,255,0.8); font-family:'Georgia',serif; outline:none; }
    .lesson-entry select { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:7px; padding:8px 10px; font-size:12px; color:rgba(255,255,255,0.6); font-family:'Georgia',serif; outline:none; }
    .lesson-entry select option { background:#1a2420; }
    .lesson-entry-rm { background:none; border:none; color:rgba(255,100,80,0.4); cursor:pointer; font-size:18px; padding:2px 6px; }
    .lesson-entry-rm:hover { color:rgba(255,100,80,0.8); }
    .add-lesson-row { padding:9px 14px; border-top:1px solid rgba(255,255,255,0.05); }
    .add-lesson-row button { background:none; border:none; color:rgba(255,255,255,0.3); font-size:12px; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; font-family:'Georgia',serif; }
    .add-lesson-row button:hover { color:rgba(180,230,200,0.7); }
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div><div class="logo">Deeper Mindfulness</div><div class="logo-name">Content Library</div></div>
    <div class="nav-tabs">
      <button class="nav-tab active" data-tab="library">Library</button>
      <button class="nav-tab" data-tab="courses">Courses</button>
      <button class="nav-tab" data-tab="playlists">Playlists</button>
      <button class="nav-tab" data-tab="categories">Categories</button>
    </div>
    <div class="topbar-right">
      <a href="/admin/" class="btn">← Admin</a>
      <button class="btn" onclick="logout()">Sign out</button>
    </div>
  </div>
  <div class="content">
    <div class="main">

      <!-- LIBRARY -->
      <div class="panel active" id="panel-library">
        <div class="toolbar">
          <div class="toolbar-title">All files</div>
          <input class="search" id="libSearch" placeholder="Search…" oninput="filterLib()"/>
          <select class="filter" id="libCat" onchange="onLibCatChange()"><option value="">All categories</option></select>
          <select class="filter" id="libSub" onchange="filterLib()"><option value="">All subcategories</option></select>
          <select class="filter" id="libVis" onchange="filterLib()">
            <option value="">All visibility</option>
            <option value="registered">Explorer</option>
            <option value="member">Member</option>
            <option value="client">Client</option>
            <option value="facilitator">Facilitator</option>
            <option value="admin">Admin</option>
          </select>
          <button class="btn primary" onclick="openUpload()">↑ Upload files</button>
        </div>
        <div class="file-grid" id="libGrid"></div>
      </div>

      <!-- COURSES -->
      <div class="panel" id="panel-courses">
        <div class="toolbar">
          <div class="toolbar-title">Courses</div>
          <select class="filter" id="courseCatF" onchange="filterCourses()"><option value="">All categories</option></select>
          <button class="btn primary" onclick="openNewCourse()">+ New course</button>
        </div>
        <div class="item-list" id="courseList"></div>
      </div>

      <!-- PLAYLISTS -->
      <div class="panel" id="panel-playlists">
        <div class="toolbar">
          <div class="toolbar-title">Playlists</div>
          <select class="filter" id="plCatF" onchange="filterPlaylists()"><option value="">All categories</option></select>
          <button class="btn primary" onclick="openNewPlaylist()">+ New playlist</button>
        </div>
        <div class="item-list" id="playlistList"></div>
      </div>

      <!-- CATEGORIES -->
      <div class="panel" id="panel-categories">
        <div class="toolbar">
          <div class="toolbar-title">Categories &amp; subcategories</div>
          <button class="btn primary" onclick="openNewCat()">+ Add category</button>
        </div>
        <div class="cat-tree" id="catTree"></div>
      </div>

    </div>
  </div>
</div>

<!-- Upload Modal -->
<div class="modal-overlay" id="uploadModal">
  <div class="modal" style="max-width:620px">
    <h3>Upload to library</h3>
    <div class="modal-row">
      <div><label>Category</label><select id="upCat" onchange="onUpCatChange()"><option value="">Select…</option></select></div>
      <div><label>Subcategory</label><select id="upSub"><option value="">Select…</option></select></div>
      <div>
        <label>Default visibility</label>
        <select id="upVisDefault" oninput="applyBatchVisibility(this.value)">
          <option value="">Per file</option>
          <option value="registered">Explorer</option>
          <option value="member">Member</option>
          <option value="client">Client</option>
          <option value="facilitator">Facilitator</option>
          <option value="admin">Admin</option>
        </select>
      </div>
    </div>
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('bulkInput').click()">
      <input type="file" id="bulkInput" multiple style="display:none"/>
      <div style="font-size:28px;margin-bottom:10px">📂</div>
      <div style="font-size:14px;color:rgba(255,255,255,0.4)">Drop files here or click to select</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.2);margin-top:6px">pdf · mp3 · mp4 · pptx · docx · jpg · any type</div>
    </div>
    <div class="upload-queue" id="upQueue"></div>
    <div class="modal-err" id="upErr"></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('uploadModal')">Cancel</button>
      <button class="modal-ok" id="upBtn" onclick="doUpload()">Upload all</button>
    </div>
  </div>
</div>

<!-- Edit File Modal -->
<div class="modal-overlay" id="editFileModal">
  <div class="modal">
    <h3>Edit file</h3>
    <input type="hidden" id="efId"/>
    <div><label>Title</label><input type="text" id="efTitle"/></div>
    <div><label>Description</label><textarea id="efDesc" rows="2"></textarea></div>
    <div>
      <label>Filename on disk <span style="color:rgba(255,255,255,0.2);font-size:10px;letter-spacing:0">(without extension)</span></label>
      <input type="text" id="efFilename" placeholder="e.g. FindingJoy_Session1_Handout"/>
    </div>
    <div class="modal-row">
      <div><label>Category</label><select id="efCat" onchange="populateSub('efCat','efSub')"><option value="">Select…</option></select></div>
      <div><label>Subcategory</label><select id="efSub"><option value="">Select…</option></select></div>
    </div>
    <div><label>Visibility</label>
      <select id="efVis">
        <option value="registered">Explorer — anyone who has signed up (free)</option>
        <option value="member">Member — paying or upgraded accounts</option>
        <option value="client">Client — facilitator-assigned clients</option>
        <option value="facilitator">Facilitator — facilitators only</option>
        <option value="admin">Admin — admin only</option>
      </select>
    </div>
    <div class="modal-err" id="efErr"></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('editFileModal')">Cancel</button>
      <button class="modal-ok" onclick="saveFileEdit()">Save</button>
    </div>
  </div>
</div>

<!-- Usage Modal -->
<div class="modal-overlay" id="usageModal">
  <div class="modal"><h3>Where used</h3><div id="usageBody"></div>
    <div class="modal-btns"><button class="modal-ok" onclick="closeModal('usageModal')">Close</button></div>
  </div>
</div>

<!-- New Course Modal -->
<div class="modal-overlay" id="newCourseModal">
  <div class="modal" style="max-width:620px">
    <h3>New course</h3>
    <div><label>Title</label><input type="text" id="cTitle" placeholder="e.g. Finding Joy — 10 Sessions"/></div>
    <div><label>Description</label><textarea id="cDesc" rows="2"></textarea></div>
    <div class="modal-row">
      <div><label>Category</label><select id="cCat" onchange="populateSub('cCat','cSub')"><option value="">Select…</option></select></div>
      <div><label>Subcategory</label><select id="cSub"><option value="">Select…</option></select></div>
    </div>
    <div><label>Lessons (files assigned after saving)</label>
      <div class="lesson-builder">
        <div class="lesson-builder-hdr">Add lessons</div>
        <div id="lessonEntries"></div>
        <div class="add-lesson-row"><button onclick="addLE()">+ Add lesson</button></div>
      </div>
    </div>
    <div class="modal-err" id="cErr"></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('newCourseModal')">Cancel</button>
      <button class="modal-ok" onclick="saveCourse()">Save course</button>
    </div>
  </div>
</div>

<!-- Course Detail Modal -->
<div class="modal-overlay" id="courseDetailModal">
  <div class="modal" style="max-width:660px">
    <h3 id="cdTitle"></h3>
    <div id="cdBody"></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('courseDetailModal')">Close</button>
      <button class="modal-ok" onclick="openAddLesson()">+ Add lesson</button>
    </div>
  </div>
</div>

<!-- Add Lesson Modal -->
<div class="modal-overlay" id="addLessonModal">
  <div class="modal" style="max-width:620px">
    <h3 id="alTitle">Add lesson</h3>
    <input type="hidden" id="alCourseId"/>
    <input type="hidden" id="alLessonId"/>
    <div class="modal-row">
      <div><label>Number</label><input type="number" id="alNum" min="1"/></div>
      <div><label>Title</label><input type="text" id="alLessonTitle"/></div>
    </div>
    <div><label>Visibility</label>
      <select id="alVis">
        <option value="registered">Explorer</option>
        <option value="member">Member</option>
        <option value="client">Client</option>
        <option value="facilitator">Facilitator</option>
      </select>
    </div>
    <div><label>Pick files from library</label>
      <div class="file-picker">
        <input class="file-picker-search" placeholder="Search library…" oninput="filterPicker(this.value,'alPicker')"/>
        <div class="file-picker-list" id="alPicker"></div>
      </div>
    </div>
    <div class="modal-err" id="alErr"></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('addLessonModal')">Cancel</button>
      <button class="modal-ok" onclick="saveLesson()">Save</button>
    </div>
  </div>
</div>

<!-- New Playlist Modal -->
<div class="modal-overlay" id="newPlaylistModal">
  <div class="modal">
    <h3>New playlist</h3>
    <div><label>Title</label><input type="text" id="plTitle"/></div>
    <div><label>Description</label><textarea id="plDesc" rows="2"></textarea></div>
    <div class="modal-row">
      <div><label>Category</label><select id="plCat" onchange="populateSub('plCat','plSub')"><option value="">Select…</option></select></div>
      <div><label>Subcategory</label><select id="plSub"><option value="">Select…</option></select></div>
    </div>
    <div class="modal-err" id="plErr"></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('newPlaylistModal')">Cancel</button>
      <button class="modal-ok" onclick="savePlaylist()">Save &amp; add tracks</button>
    </div>
  </div>
</div>

<!-- Playlist Detail Modal -->
<div class="modal-overlay" id="playlistDetailModal">
  <div class="modal" style="max-width:660px">

<script>
let allCats=[],allFiles=[],allCourses=[],allPlaylists=[];
let upQueue=[];
let leCount=0;
let curCourseId=null, curPlaylistId=null, addFilesLessonId=null;

// Nav
document.querySelectorAll('.nav-tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  document.getElementById('panel-'+t.dataset.tab).classList.add('active');
}));

function closeModal(id){document.getElementById(id).classList.remove('open');}
function openModal(id){document.getElementById(id).classList.add('open');}
async function logout(){await fetch('/api/logout',{method:'POST'});location.href='/login';}

function ficon(t=''){
  if(t.includes('audio')||t.includes('mp3')||t.includes('mpeg'))return'🎵';
  if(t.includes('video')||t.includes('mp4'))return'🎬';
  if(t.includes('pdf'))return'📕';
  if(t.includes('image'))return'🖼️';
  if(t.includes('word')||t.includes('document'))return'📝';
  if(t.includes('presentation')||t.includes('powerpoint'))return'📊';
  return'📄';
}
function fsize(b){if(!b)return'';if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB';}
async function updateVisibility(fileId, vis) {
  await fetch(`/api/content/library/${fileId}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ visibility: vis })
  });
  // Update local data without re-fetching everything
  const f = allFiles.find(x => x.id === fileId);
  if (f) f.visibility = vis;
}

function vbadge(v){const m={registered:'Explorer',member:'Member',client:'Client',facilitator:'Facilitator',admin:'Admin'};return`<span class="vis-badge vis-${v}">${m[v]||v}</span>`;}

function populateCatSels(...ids){
  const tops=allCats.filter(c=>!c.parent_id);
  ids.forEach(id=>{
    const el=document.getElementById(id);if(!el)return;
    const isFilter=id.includes('F')||id.includes('Filter');
    const isParent=id==='catParent';
    el.innerHTML=isFilter?'<option value="">All categories</option>':isParent?'<option value="">Top level</option>':'<option value="">Select…</option>';
    tops.forEach(c=>{el.innerHTML+=`<option value="${c.id}">${c.name}</option>`;});
  });
}

function populateSub(catSelId,subSelId,selectedId=''){
  const catId=document.getElementById(catSelId).value;
  const el=document.getElementById(subSelId);
  el.innerHTML='<option value="">Select…</option>';
  allCats.filter(c=>c.parent_id===catId).forEach(s=>{
    el.innerHTML+=`<option value="${s.id}"${s.id===selectedId?' selected':''}>${s.name}</option>`;
  });
}

async function loadAll(){
  const [cats,files,courses,pls]=await Promise.all([
    fetch('/api/content/categories').then(r=>r.json()),
    fetch('/api/content/library').then(r=>r.json()),
    fetch('/api/content/courses').then(r=>r.json()),
    fetch('/api/content/playlists').then(r=>r.json()),
  ]);
  allCats=cats;allFiles=files;allCourses=courses;allPlaylists=pls;
  populateCatSels('libCat','upCat','efCat','cCat','plCat','catParent','courseCatF','plCatF');
  renderLib(files);renderCourses(courses);renderPlaylists(pls);renderCats(cats);
}

// ── Library ──
function onLibCatChange(){populateSub('libCat','libSub');filterLib();}
function filterLib(){
  const cat=document.getElementById('libCat').value;
  const sub=document.getElementById('libSub').value;
  const vis=document.getElementById('libVis').value;
  const q=document.getElementById('libSearch').value.toLowerCase();
  renderLib(allFiles.filter(f=>
    (!cat||f.category_id===cat)&&(!sub||f.subcategory_id===sub)&&
    (!vis||f.visibility===vis)&&(!q||f.title.toLowerCase().includes(q)||(f.original_name||'').toLowerCase().includes(q))
  ));
}

function renderLib(files){
  const el=document.getElementById('libGrid');
  if(!files.length){el.innerHTML='<div class="empty">No files yet. Upload to get started.</div>';return;}
  el.innerHTML=files.map(f=>`
    <div class="file-card">
      <div class="file-card-body">
        <div class="file-card-icon">${ficon(f.file_type)}</div>
        <div class="file-card-title">${f.title}</div>
        <div class="file-card-meta">${f.original_name||''} · ${fsize(f.file_size)}</div>
        <div class="file-card-tags" style="align-items:center;gap:4px">
          ${f.category_name?`<span class="tag cat">${f.category_name}</span>`:''}
          ${f.subcategory_name?`<span class="tag cat">${f.subcategory_name}</span>`:''}
          <select class="vis-sel" style="font-size:11px;padding:2px 6px;height:22px" onchange="updateVisibility('${f.id}',this.value)">
            <option value="registered" ${f.visibility==='registered'?'selected':''}>Explorer</option>
            <option value="member"     ${f.visibility==='member'    ?'selected':''}>Member</option>
            <option value="client"     ${f.visibility==='client'    ?'selected':''}>Client</option>
            <option value="facilitator"${f.visibility==='facilitator'?'selected':''}>Facilitator</option>
            <option value="admin"      ${f.visibility==='admin'     ?'selected':''}>Admin</option>
          </select>
          ${f.use_count>0?`<span class="tag uses">Used ${f.use_count}×</span>`:''}
        </div>
      </div>
      <div class="file-card-footer">
        <button class="btn sm" onclick="openEditFile('${f.id}')">Edit</button>
        ${f.use_count>0?`<button class="btn sm" onclick="showUsage('${f.id}')">Where used</button>`:''}
        <button class="btn sm" onclick="openFile('${f.id}')">Open</button>
        <button class="btn sm danger" onclick="delFile('${f.id}')">Delete</button>

  `).join('');

function applyBatchVisibility(vis) {

  upQueue.forEach(it => { it.vis = vis; it.inferred = false; });
  renderQ();
}

dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));

// ── Filename inference ──
const CAT_KEYWORDS = {
  'cat-mindfulness': ['mindfulness','mbct','mbsr','meditation'],
  'cat-felt':        ['felt','fibre','fiber','findingjoy','findingcalm','finding-joy','finding-calm','finding_joy','finding_calm'],
  'cat-girls':       ['girls','girlsprogramme','girls-programme','girls_programme','hfpm'],
  'cat-therapy':     ['therapy','therapist','cbt','counsell'],
};
const SUB_KEYWORDS = {
  'sub-mfl':          ['forlife','for-life','for_life','mfl'],
  'sub-mbct':         ['mbct'],
  'sub-mbsr':         ['mbsr'],
  'sub-mind-intro':   ['mindintro','mind-intro','mindfulness-intro'],
  'sub-deeper':       ['deepermindfulness','deeper-mindfulness','deeper_mindfulness','deeper'],
  'sub-felt-intro':   ['feltintro','felt-intro','felt_intro'],
  'sub-felt-prac':    ['practitioner','prac'],
  'sub-finding-calm': ['findingcalm','finding-calm','finding_calm'],
  'sub-finding-joy':  ['findingjoy','finding-joy','finding_joy'],
  'sub-girls-y':      ['youngergirls','younger-girls','younger_girls','yg'],
  'sub-girls-o':      ['oldergirls','older-girls','older_girls','og'],
  'sub-cbt':          ['cbt'],
  'sub-felt-therapy': ['felttherapy','felt-therapy','felt_therapy'],
  'sub-therapy-gen':  ['general','gen'],
};
const VIS_KEYWORDS = {
  facilitator: ['facilitator','facilitatornotes','admin','adminnotes','slides','pptx','trainers','trainer','facilitatorsguide'],
  registered:  ['intro','introduction','welcome','overview','public','promo','about'],
  member:      ['free','open','member','premium','paid'],
  client:      ['student','handout','studenthandout','practice','audio','client'],
};

function inferFromFilename(name) {
  const n = name.toLowerCase().replace(/[\s._-]+/g,'');

  // Infer visibility
  let vis = 'registered';
  for (const [v, keys] of Object.entries(VIS_KEYWORDS)) {
    if (keys.some(k => n.includes(k))) { vis = v; break; }
  }

  // Infer category
  let catId = '', subId = '';
  for (const [cat, keys] of Object.entries(CAT_KEYWORDS)) {
    if (keys.some(k => n.includes(k))) { catId = cat; break; }
  }

  // Infer subcategory
  for (const [sub, keys] of Object.entries(SUB_KEYWORDS)) {
    if (keys.some(k => n.includes(k))) { subId = sub; break; }
  }

  return { vis, catId, subId };
}

function addToQ(files){
  Array.from(files).forEach(f=>{
    const inferred = inferFromFilename(f.name);
    upQueue.push({file:f, vis:inferred.vis, catId:inferred.catId, subId:inferred.subId, inferred:true});
  });
  renderQ();
}
function getCatName(id){return allCats.find(c=>c.id===id)?.name||'';}

function renderQ(){
  document.getElementById('upQueue').innerHTML=upQueue.map((it,i)=>{
    const inferredLabel = it.inferred && (it.catId||it.subId||it.vis!=='client')
      ? `<span style="font-size:10px;color:rgba(180,230,200,0.5);margin-left:4px">↳ ${getCatName(it.catId)||'?'} ${getCatName(it.subId)?'/ '+getCatName(it.subId):''} · ${it.vis}</span>` : '';
    const progressBar = (it.progress > 0 && it.progress < 100)
      ? `<div style="height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin-top:4px;overflow:hidden"><div style="height:100%;width:${it.progress}%;background:rgba(180,230,200,0.5);transition:width 0.15s"></div></div>`
      : it.progress === 100
      ? `<div style="font-size:10px;color:rgba(180,230,200,0.6);margin-top:2px">✓ Uploaded</div>` : '';
    return `
    <div class="upload-item" style="flex-wrap:wrap;gap:6px">
      <span style="font-size:16px">${ficon(it.file.type)}</span>
      <div class="upload-item-name" style="flex:1;min-width:0">
        <input type="text" value="${it.file.name.replace(/\.[^.]+$/,'')}" onchange="upQueue[${i}].customTitle=this.value"
          style="background:none;border:none;border-bottom:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.78);font-size:12px;font-family:Georgia,serif;outline:none;width:100%;padding:2px 0"/>
        <div style="font-size:10px;color:rgba(255,255,255,0.2);margin-top:2px">${fsize(it.file.size)}${inferredLabel}</div>
        ${progressBar}
      </div>
      <select class="vis-sel" onchange="upQueue[${i}].vis=this.value;upQueue[${i}].inferred=false">
        <option value="registered"${it.vis==='registered'?' selected':''}>Explorer</option>
        <option value="member"${it.vis==='member'?' selected':''}>Member</option>
        <option value="client"${it.vis==='client'?' selected':''}>Client</option>
        <option value="facilitator"${it.vis==='facilitator'?' selected':''}>Facilitator</option>
        <option value="admin"${it.vis==='admin'?' selected':''}>Admin</option>
      </select>
      <button onclick="upQueue.splice(${i},1);renderQ()" style="background:none;border:none;color:rgba(255,100,80,0.5);cursor:pointer;font-size:18px">×</button>
    </div>`;
  }).join('');
}

async function uploadOneFile(it, cat, sub) {
  const title = it.customTitle || it.file.name.replace(/\.[^.]+$/,'');

  // Step 1: ask the server for a presigned R2 upload URL.
  const presignRes = await fetch('/api/content/library/presign-upload', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ filename: it.file.name, contentType: it.file.type })
  });

  if (!presignRes.ok) {
    // R2 not configured yet, or some other failure — fall back to the legacy
    // direct-through-Express path so uploads still work during the migration.
    const fd = new FormData();
    fd.append('file', it.file);
    fd.append('title', title);
    fd.append('categoryId',    cat || it.catId || '');
    fd.append('subcategoryId', sub || it.subId || '');
    fd.append('visibility',    it.vis);
    const res = await fetch('/api/content/library', { method: 'POST', body: fd });
    if (!res.ok) throw new Error((await res.json().catch(()=>({})))?.error || 'Upload failed.');
    return;
  }

  const { uploadUrl, key } = await presignRes.json();

  // Step 2: browser uploads the file directly to R2 — never passes through Express,
  // so there's no 50MB ceiling here. Track progress via XHR since fetch() doesn't expose
  // upload progress events.
  await new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('PUT', uploadUrl);
    xhr.setRequestHeader('Content-Type', it.file.type || 'application/octet-stream');
    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable) it.progress = Math.round((e.loaded / e.total) * 100);
      renderQ();
    };
    xhr.onload = () => (xhr.status >= 200 && xhr.status < 300) ? resolve() : reject(new Error(`Upload failed (${xhr.status}).`));
    xhr.onerror = () => reject(new Error('Upload failed — network error.'));
    xhr.send(it.file);
  });

  // Step 3: tell the server the upload succeeded, save the metadata row.
  const fd = new FormData();
  fd.append('title', title);
  fd.append('description', '');
  fd.append('categoryId',    cat || it.catId || '');
  fd.append('subcategoryId', sub || it.subId || '');
  fd.append('visibility',    it.vis);
  fd.append('r2Key',         key);
  fd.append('originalName',  it.file.name);
  fd.append('contentType',   it.file.type || 'application/octet-stream');
  fd.append('fileSize',      it.file.size);
  const confirmRes = await fetch('/api/content/library', { method: 'POST', body: fd });
  if (!confirmRes.ok) throw new Error((await confirmRes.json().catch(()=>({})))?.error || 'Could not save file metadata.');
}

// Opens a library file in a new tab. Asks the server for a playback URL rather than
// constructing /uploads/:filename directly — for R2-stored files, `filename` is now
// an R2 object key, not a path that exists on the Railway disk, so the old direct-link
// approach only ever worked for legacy disk files and breaks silently for anything
// uploaded since the R2 migration.
async function openFile(id) {
  try {
    const res = await fetch(`/api/content/library/${id}/playback-url`);
    const data = await res.json();
    if (!res.ok || !data.url) {
      alert(data.error || 'Could not open this file.');
      return;
    }
    window.open(data.url, '_blank');
  } catch {
    alert('Could not open this file — network error.');
  }
}

async function doUpload(){
  const cat=document.getElementById('upCat').value;
  const sub=document.getElementById('upSub').value;
  const err=document.getElementById('upErr');
  if(!cat){err.textContent='Select a category.';return;}
  if(!upQueue.length){err.textContent='No files selected.';return;}
  err.textContent='';
  const btn=document.getElementById('upBtn');
  btn.disabled=true;btn.textContent='Uploading…';
  for(const it of upQueue){
    it.progress = 0;
    try {
      await uploadOneFile(it, cat, sub);
      it.progress = 100;
    } catch (e) {
      err.textContent = `${it.file.name}: ${e.message}`;
      btn.disabled=false;btn.textContent='Upload all';
      renderQ();
      return; // stop the batch on first failure so the admin sees which file failed
    }
  }
  btn.disabled=false;btn.textContent='Upload all';
  closeModal('uploadModal');
  loadAll();
}

// ── Edit file ──
function openEditFile(id){
  const f=allFiles.find(x=>x.id===id);if(!f)return;
  document.getElementById('efId').value=f.id;
  document.getElementById('efTitle').value=f.title;
  document.getElementById('efDesc').value=f.description||'';
  document.getElementById('efVis').value=f.visibility||'client';
  document.getElementById('efErr').textContent='';
  // Show filename without extension and uuid prefix
  const rawName = f.filename || '';
  const ext = rawName.lastIndexOf('.')>0 ? rawName.slice(rawName.lastIndexOf('.')) : '';
  const nameNoExt = rawName.slice(0, rawName.length - ext.length);
  document.getElementById('efFilename').value=f.original_name ? f.original_name.replace(/\.[^.]+$/,'') : nameNoExt;
  populateCatSels('efCat');
  document.getElementById('efCat').value=f.category_id||'';
  populateSub('efCat','efSub',f.subcategory_id||'');
  openModal('editFileModal');
}

async function saveFileEdit(){
  const id=document.getElementById('efId').value;
  const title=document.getElementById('efTitle').value.trim();
  const newFilename=document.getElementById('efFilename').value.trim();
  if(!title){document.getElementById('efErr').textContent='Title required.';return;}
  // Update metadata
  await fetch(`/api/content/library/${id}`,{
    method:'PATCH',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({title,description:document.getElementById('efDesc').value,
      category_id:document.getElementById('efCat').value,
      subcategory_id:document.getElementById('efSub').value||null,
      visibility:document.getElementById('efVis').value})
  });
  // Rename file if changed
  if(newFilename){
    await fetch(`/api/content/library/${id}/rename`,{
      method:'PATCH',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({filename:newFilename})
    });
  }
  closeModal('editFileModal');loadAll();
}

async function showUsage(id){
  const d=await fetch(`/api/content/library/${id}/usage`).then(r=>r.json());
  let h='';
  if(d.lessons.length) h+=`<div style="margin-bottom:12px"><div style="font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.3);margin-bottom:8px">In courses</div>${d.lessons.map(l=>`<div style="font-size:13px;color:rgba(255,255,255,0.6);padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05)">${l.course_title} → ${l.lesson_title}</div>`).join('')}</div>`;
  if(d.playlists.length) h+=`<div><div style="font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.3);margin-bottom:8px">In playlists</div>${d.playlists.map(p=>`<div style="font-size:13px;color:rgba(255,255,255,0.6);padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05)">${p.playlist_title}</div>`).join('')}</div>`;
  if(!h) h='<div style="color:rgba(255,255,255,0.3);font-style:italic;font-size:13px">Not yet used in any course or playlist.</div>';
  document.getElementById('usageBody').innerHTML=h;
  openModal('usageModal');
}

async function delFile(id){
  const f=allFiles.find(x=>x.id===id);
  if(!confirm(`Delete "${f?.title}"? Removes from courses/playlists too.`))return;
  await fetch(`/api/content/library/${id}`,{method:'DELETE'});
  loadAll();
}

// ── File picker ──
function renderPicker(pickerId,selIds=[]){
  const el=document.getElementById(pickerId);
  el.innerHTML=allFiles.map(f=>`
    <div class="picker-item${selIds.includes(f.id)?' sel':''}" data-id="${f.id}" onclick="togglePick(this)">
      <input type="checkbox" style="accent-color:#b4e6c8;pointer-events:none" ${selIds.includes(f.id)?'checked':''}/>
      <span style="font-size:16px">${ficon(f.file_type)}</span>
      <div class="picker-item-info">
        <div class="picker-item-title">${f.title}</div>
        <div class="picker-item-meta">${f.category_name||''} ${f.subcategory_name?'/ '+f.subcategory_name:''} · ${vbadge(f.visibility)}</div>
      </div>
    </div>
  `).join('');
}

function togglePick(el){
  el.classList.toggle('sel');
  const cb=el.querySelector('input');if(cb)cb.checked=el.classList.contains('sel');
}

function filterPicker(q,pickerId){
  const ql=q.toLowerCase();
  document.getElementById(pickerId).querySelectorAll('.picker-item').forEach(el=>{
    const t=el.querySelector('.picker-item-title')?.textContent.toLowerCase()||'';
    el.style.display=(!ql||t.includes(ql))?'':'none';
  });
}

function getPickerSel(pickerId){
  return Array.from(document.getElementById(pickerId).querySelectorAll('.picker-item.sel')).map(el=>el.dataset.id).filter(Boolean);
}

// ── Courses ──
function filterCourses(){const c=document.getElementById('courseCatF').value;renderCourses(allCourses.filter(x=>!c||x.category_id===c));}

function renderCourses(courses){
  const el=document.getElementById('courseList');
  if(!courses.length){el.innerHTML='<div class="empty">No courses yet.</div>';return;}
  el.innerHTML=courses.map(c=>`
    <div class="item-row">
      <div class="item-row-info">
        <div class="item-row-title">${c.title}</div>
        <div class="item-row-meta">${c.description||''}</div>
        <div class="item-row-tags">
          ${c.category_name?`<span class="tag cat">${c.category_name}</span>`:''}
          ${c.subcategory_name?`<span class="tag cat">${c.subcategory_name}</span>`:''}
        </div>
      </div>
      <div class="item-row-actions">
        <button class="btn sm" onclick="openCourseDetail('${c.id}')">Lessons</button>
        <button class="btn sm danger" onclick="delCourse('${c.id}')">Delete</button>
      </div>
    </div>
  `).join('');
}

function openNewCourse(){
  leCount=0;
  document.getElementById('cTitle').value='';document.getElementById('cDesc').value='';
  document.getElementById('cCat').value='';document.getElementById('cSub').innerHTML='<option value="">Select…</option>';
  document.getElementById('lessonEntries').innerHTML='';document.getElementById('cErr').textContent='';
  addLE();openModal('newCourseModal');
}

function addLE(){
  leCount++;const n=leCount;
  const d=document.createElement('div');d.className='lesson-entry';d.id=`le-${n}`;
  d.innerHTML=`<div class="lesson-entry-num">${n}</div>
    <input type="text" placeholder="Lesson title" id="le-t-${n}"/>
    <select id="le-v-${n}"><option value="client">Client</option><option value="facilitator">Facilitator</option><option value="guest">Guest</option></select>
    <button class="lesson-entry-rm" onclick="document.getElementById('le-${n}').remove()">×</button>`;
  document.getElementById('lessonEntries').appendChild(d);
}

async function saveCourse(){
  const title=document.getElementById('cTitle').value.trim();
  const catId=document.getElementById('cCat').value;
  const err=document.getElementById('cErr');
  if(!title||!catId){err.textContent='Title and category required.';return;}
  const lessons=[];
  document.querySelectorAll('.lesson-entry').forEach((el,i)=>{
    const t=el.querySelector('input[type=text]');const v=el.querySelector('select');
    if(t?.value.trim())lessons.push({number:i+1,title:t.value.trim(),visibility:v?.value||'client'});
  });
  const res=await fetch('/api/content/courses',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({title,description:document.getElementById('cDesc').value,
      categoryId:catId,subcategoryId:document.getElementById('cSub').value||null,lessons})});
  const d=await res.json();
  if(d.error){err.textContent=d.error;return;}
  closeModal('newCourseModal');loadAll();openCourseDetail(d.id);
}

async function openCourseDetail(courseId){
  curCourseId=courseId;
  const c=allCourses.find(x=>x.id===courseId)||{};
  document.getElementById('cdTitle').textContent=c.title||'Course';
  document.getElementById('alCourseId').value=courseId;
  const lessons=await fetch(`/api/content/courses/${courseId}/lessons`).then(r=>r.json());
  const el=document.getElementById('cdBody');
  if(!lessons.length){el.innerHTML='<div class="empty" style="padding:16px">No lessons yet.</div>';openModal('courseDetailModal');return;}
  let h='<div style="display:flex;flex-direction:column;gap:8px">';
  for(const l of lessons){
    const files=await fetch(`/api/content/lessons/${l.id}/files`).then(r=>r.json());
    h+=`<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:9px;overflow:hidden">
      <div style="padding:11px 14px;display:flex;align-items:center;gap:10px">
        <div style="font-size:16px;color:rgba(255,255,255,0.2);min-width:22px">${l.lesson_number}</div>
        <div style="flex:1"><div style="font-size:13px;color:rgba(255,255,255,0.78)">${l.title}</div><div style="margin-top:3px">${vbadge(l.visibility)}</div></div>
        <button class="btn sm" onclick="openAddFilesToLesson('${l.id}','${l.title}')">+ Files</button>
        <button class="btn sm danger" onclick="delLesson('${l.id}')">Delete</button>
      </div>
      ${files.length?`<div style="border-top:1px solid rgba(255,255,255,0.05);padding:8px 14px;display:flex;flex-wrap:wrap;gap:6px">
        ${files.map(f=>`<div style="display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.04);border-radius:6px;padding:4px 8px;font-size:12px;color:rgba(255,255,255,0.55)">
          ${ficon(f.file_type)} ${f.title}
          <button onclick="rmLessonFile('${f.ref_id}')" style="background:none;border:none;color:rgba(255,100,80,0.4);cursor:pointer;font-size:14px">×</button>
        </div>`).join('')}
      </div>`:''}
    </div>`;
  }
  h+='</div>';
  el.innerHTML=h;openModal('courseDetailModal');
}

function openAddFilesToLesson(lessonId,lessonTitle){
  addFilesLessonId=lessonId;
  document.getElementById('alTitle').textContent='Add files to: '+lessonTitle;
  document.getElementById('alNum').value='';document.getElementById('alLessonTitle').value=lessonTitle;
  document.getElementById('alVis').value='client';document.getElementById('alErr').textContent='';
  document.getElementById('alLessonId').value=lessonId;
  renderPicker('alPicker');openModal('addLessonModal');
}

function openAddLesson(){
  addFilesLessonId=null;
  document.getElementById('alTitle').textContent='Add lesson';
  document.getElementById('alNum').value='';document.getElementById('alLessonTitle').value='';
  document.getElementById('alVis').value='client';document.getElementById('alErr').textContent='';
  document.getElementById('alLessonId').value='';
  renderPicker('alPicker');openModal('addLessonModal');
}

async function saveLesson(){
  const courseId=document.getElementById('alCourseId').value;
  const lessonId=document.getElementById('alLessonId').value;
  const title=document.getElementById('alLessonTitle').value.trim();
  const num=document.getElementById('alNum').value;
  const vis=document.getElementById('alVis').value;
  const fileIds=getPickerSel('alPicker');
  const err=document.getElementById('alErr');

  if(addFilesLessonId){
    for(const fid of fileIds){
      await fetch('/api/content/lesson-file-refs',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({lessonId:addFilesLessonId,fileId:fid})});
    }
    closeModal('addLessonModal');openCourseDetail(courseId);return;
  }

  if(!title||!num){err.textContent='Number and title required.';return;}
  const res=await fetch('/api/content/lessons',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({courseId,lessonNumber:parseInt(num),title,visibility:vis,fileIds})});
  const d=await res.json();
  if(d.error){err.textContent=d.error;return;}
  closeModal('addLessonModal');openCourseDetail(courseId);
}

async function rmLessonFile(refId){
  await fetch(`/api/content/lesson-file-refs/${refId}`,{method:'DELETE'});
  openCourseDetail(curCourseId);
}
async function delLesson(id){if(!confirm('Delete this lesson?'))return;await fetch(`/api/content/lessons/${id}`,{method:'DELETE'});openCourseDetail(curCourseId);}
async function delCourse(id){if(!confirm('Delete course and all lessons?'))return;await fetch(`/api/content/courses/${id}`,{method:'DELETE'});loadAll();}

// ── Playlists ──
function filterPlaylists(){const c=document.getElementById('plCatF').value;renderPlaylists(allPlaylists.filter(p=>!c||p.category_id===c));}

function renderPlaylists(pls){
  const el=document.getElementById('playlistList');
  if(!pls.length){el.innerHTML='<div class="empty">No playlists yet.</div>';return;}
  el.innerHTML=pls.map(p=>`
    <div class="item-row">
      <div class="item-row-info">
        <div class="item-row-title">${p.title}</div>
        <div class="item-row-meta">${p.track_count||0} track${p.track_count===1?'':'s'} · ${p.description||''}</div>
        <div class="item-row-tags">
          ${p.category_name?`<span class="tag cat">${p.category_name}</span>`:''}
          ${p.subcategory_name?`<span class="tag cat">${p.subcategory_name}</span>`:''}
        </div>
      </div>
      <div class="item-row-actions">
        <button class="btn sm" onclick="openPD('${p.id}')">Tracks</button>
        <button class="btn sm danger" onclick="delPL('${p.id}')">Delete</button>
      </div>
    </div>
  `).join('');
}

function openNewPlaylist(){
  document.getElementById('plTitle').value='';document.getElementById('plDesc').value='';
  document.getElementById('plCat').value='';document.getElementById('plSub').innerHTML='<option value="">Select…</option>';
  document.getElementById('plErr').textContent='';openModal('newPlaylistModal');
}

async function savePlaylist(){
  const title=document.getElementById('plTitle').value.trim();
  const catId=document.getElementById('plCat').value;
  const err=document.getElementById('plErr');
  if(!title||!catId){err.textContent='Title and category required.';return;}
  const res=await fetch('/api/content/playlists',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({title,description:document.getElementById('plDesc').value,
      categoryId:catId,subcategoryId:document.getElementById('plSub').value||null})});
  const d=await res.json();if(d.error){err.textContent=d.error;return;}
  closeModal('newPlaylistModal');await loadAll();openPD(d.id);
}

async function openPD(playlistId){
  curPlaylistId=playlistId;
  const p=allPlaylists.find(x=>x.id===playlistId)||{};
  document.getElementById('pdTitle').textContent=p.title||'Playlist';
  document.getElementById('pdErr').textContent='';
  const tracks=await fetch(`/api/content/playlists/${playlistId}/tracks`).then(r=>r.json());
  const el=document.getElementById('pdTracks');
  if(!tracks.length){
    el.innerHTML='<div style="color:rgba(255,255,255,0.25);font-style:italic;font-size:13px;padding:4px 0">No tracks yet.</div>';
  }else{
    el.innerHTML='<div style="display:flex;flex-direction:column;gap:5px">'+tracks.map((t,i)=>`
      <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:9px 13px;display:flex;align-items:center;gap:9px">
        <span style="color:rgba(255,255,255,0.2);min-width:18px;font-size:12px">${i+1}</span>
        <span style="font-size:16px">${ficon(t.file_type)}</span>
        <div style="flex:1"><div style="font-size:13px;color:rgba(255,255,255,0.78)">${t.track_title||t.title}</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.3)">${t.original_name||''} · ${vbadge(t.visibility)}</div></div>
        <button class="btn sm danger" onclick="rmTrack('${t.ref_id}')">Remove</button>
      </div>
    `).join('')+'</div>';
  }
  const existingIds=tracks.map(t=>t.id);
  renderPicker('pdPicker',existingIds);
  openModal('playlistDetailModal');
}

async function addTracks(){
  const fileIds=getPickerSel('pdPicker');
  const err=document.getElementById('pdErr');
  if(!fileIds.length){err.textContent='Select at least one file.';return;}
  const existing=await fetch(`/api/content/playlists/${curPlaylistId}/tracks`).then(r=>r.json());
  const existIds=existing.map(t=>t.id);
  let order=existing.length;
  for(const fid of fileIds){
    if(existIds.includes(fid))continue;
    const file=allFiles.find(f=>f.id===fid);
    await fetch('/api/content/playlist-track-refs',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({playlistId:curPlaylistId,fileId:fid,title:file?.title||'',sortOrder:order++})});
  }
  openPD(curPlaylistId);
}

async function rmTrack(refId){await fetch(`/api/content/playlist-track-refs/${refId}`,{method:'DELETE'});openPD(curPlaylistId);}
async function delPL(id){if(!confirm('Delete playlist?'))return;await fetch(`/api/content/playlists/${id}`,{method:'DELETE'});loadAll();}

// ── Categories ──
function renderCats(cats){
  const tops=cats.filter(c=>!c.parent_id);
  document.getElementById('catTree').innerHTML=tops.map(cat=>{
    const subs=cats.filter(c=>c.parent_id===cat.id);
    return`<div class="cat-top">
      <div class="cat-top-row">
        <div class="cat-top-name">${cat.name}</div>
        <button class="btn sm" onclick="openRenameCat('${cat.id}','${cat.name.replace(/'/g,"\\'")}',null)">Rename</button>
        <button class="btn sm danger" onclick="delCat('${cat.id}')">Delete</button>
      </div>
      ${subs.length?`<div>${subs.map(s=>`
        <div class="cat-sub-row">
          <div class="cat-sub-name">${s.name}</div>
          <button class="btn sm" onclick="openRenameCat('${s.id}','${s.name.replace(/'/g,"\\'")}','${cat.id}')">Rename</button>
          <button class="btn sm danger" onclick="delCat('${s.id}')">Delete</button>
        </div>`).join('')}</div>`:''}
    </div>`;
  }).join('');
}

function openNewCat(){
  document.getElementById('catModalTitle').textContent='New category';
  document.getElementById('catId').value='';document.getElementById('catName').value='';
  document.getElementById('catErr').textContent='';document.getElementById('catParent').value='';
  openModal('catModal');
}

function openRenameCat(id,name,parentId){
  document.getElementById('catModalTitle').textContent='Rename category';
  document.getElementById('catId').value=id;document.getElementById('catName').value=name;
  document.getElementById('catErr').textContent='';
  document.getElementById('catParent').value=parentId||'';
  openModal('catModal');
}

async function saveCat(){
  const id=document.getElementById('catId').value;
  const name=document.getElementById('catName').value.trim();
  const parentId=document.getElementById('catParent').value||null;
  const err=document.getElementById('catErr');
  if(!name){err.textContent='Name required.';return;}
  if(id){
    await fetch(`/api/content/categories/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({name})});
  }else{
    await fetch('/api/content/categories',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,parentId})});
  }
  closeModal('catModal');loadAll();
}

async function delCat(id){
  if(!confirm('Delete this category?'))return;
  await fetch(`/api/content/categories/${id}`,{method:'DELETE'});loadAll();
}

loadAll();
</script>
